<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Brigade — Kitchen Display</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%; overflow:hidden;
  background:#f0f2f5 !important;
  color:#1a202c;
  font-family:'Inter',sans-serif;
}
#root { display:flex; flex-direction:column; height:100vh; background:#f0f2f5; }

/* ── HEADER ── */
#header {
  background:#1a202c; color:#fff;
  display:flex; align-items:center; gap:12px;
  height:52px; padding:0 16px; flex-shrink:0;
}
.h-brand { font-size:11px; font-weight:900; letter-spacing:0.25em; color:#4a5568; text-transform:uppercase; }
.h-divider { width:1px; height:24px; background:#2d3748; }
.h-clock { font-family:'JetBrains Mono',monospace; font-size:26px; font-weight:700; color:#fff; }
.h-date  { font-size:11px; color:#718096; margin-right:auto; }

/* Service timer pill */
.svc-pill {
  display:flex; align-items:center; gap:6px;
  padding:5px 14px; border-radius:24px; font-size:11px; font-weight:800;
  letter-spacing:0.08em; text-transform:uppercase;
}
.svc-before  { background:#1e3a5f; color:#60a5fa; border:1px solid #1e40af; }
.svc-open    { background:#14532d; color:#4ade80; border:1px solid #166534; }
.svc-closing { background:#78350f; color:#fbbf24; border:1px solid #92400e; }
.svc-dot { width:7px; height:7px; border-radius:50%; background:currentColor; }
.svc-blink { animation:blink 1.2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* Alert pill */
.alert-pill {
  display:flex; align-items:center; gap:5px;
  padding:5px 12px; border-radius:24px; font-size:10px; font-weight:800;
  letter-spacing:0.08em; text-transform:uppercase;
}
.ap-ok     { background:#14532d; color:#4ade80; border:1px solid #166534; }
.ap-warn   { background:#78350f; color:#fbbf24; border:1px solid #92400e; }

/* ── BODY ── */
#body {
  display:grid;
  grid-template-columns: 270px 1fr 250px;
  flex:1; overflow:hidden; gap:8px; padding:8px;
}

/* ── CARD BASE ── */
.card {
  background:#fff; border-radius:12px;
  box-shadow:0 1px 4px rgba(0,0,0,0.08);
  display:flex; flex-direction:column; overflow:hidden;
}
.card-head {
  padding:10px 14px 8px; border-bottom:2px solid #f0f2f5;
  display:flex; align-items:baseline; justify-content:space-between; flex-shrink:0;
}
.card-title { font-size:18px; font-weight:900; color:#1a202c; letter-spacing:-0.02em; }
.card-sub   { font-size:10px; font-weight:700; color:#a0aec0; text-transform:uppercase; letter-spacing:0.1em; }
.card-body  { flex:1; overflow:hidden; padding:10px 12px; display:flex; flex-direction:column; gap:6px; }

/* ── LEFT: SALES ── */
#panel-left { }
.sales-tabs { display:flex; gap:4px; }
.stab { width:20px; height:3px; border-radius:2px; background:#e2e8f0; transition:background 0.3s; }
.stab.active { background:#3b82f6; }

.big-num { font-family:'JetBrains Mono',monospace; font-size:40px; font-weight:700; color:#1a202c; line-height:1; }
.big-label { font-size:10px; font-weight:800; color:#a0aec0; text-transform:uppercase; letter-spacing:0.15em; margin-bottom:3px; }
.sales-meta { display:flex; gap:12px; margin-top:5px; }
.sales-meta span { font-size:11px; color:#718096; font-weight:600; }

.sdivider { height:1px; background:#f0f2f5; margin:6px 0; }
.section-label { font-size:10px; font-weight:800; color:#a0aec0; text-transform:uppercase; letter-spacing:0.15em; margin-bottom:4px; }

.rank-row { display:flex; align-items:center; gap:6px; padding:5px 0; border-bottom:1px solid #f7f8fa; }
.rank-n   { font-size:10px; color:#cbd5e0; font-family:'JetBrains Mono',monospace; width:16px; flex-shrink:0; }
.rank-nm  { flex:1; font-size:13px; font-weight:700; color:#2d3748; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.rank-q   { font-size:12px; font-weight:800; color:#3b82f6; font-family:'JetBrains Mono',monospace; }

.exp-row  { display:flex; align-items:center; gap:6px; padding:5px 0; border-bottom:1px solid #f7f8fa; }
.exp-nm   { flex:1; font-size:13px; font-weight:700; color:#2d3748; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.exp-q    { font-size:13px; font-weight:800; color:#f59e0b; font-family:'JetBrains Mono',monospace; }
.exp-avg  { font-size:9px; color:#cbd5e0; }

/* ── CENTRE: PREP ── */
#panel-centre { }
#prep-grid {
  flex:1; overflow:hidden;
  display:grid; grid-template-columns:1fr 1fr 1fr;
  gap:6px; padding:10px 12px;
}
.st-col { display:flex; flex-direction:column; gap:4px; }
.st-head {
  padding:6px 10px; border-radius:8px; font-size:11px; font-weight:900;
  letter-spacing:0.1em; text-transform:uppercase;
  display:flex; align-items:center; justify-content:space-between;
}
.st-count { font-size:10px; font-weight:700; opacity:0.75; }

/* Station colors — light theme */
.s-oven    { background:#fff7ed; border:2px solid #fb923c; color:#c2410c; }
.s-pasta   { background:#eff6ff; border:2px solid #60a5fa; color:#1d4ed8; }
.s-fpasta  { background:#f0fdf4; border:2px solid #34d399; color:#065f46; }
.s-salad   { background:#f0fdf4; border:2px solid #4ade80; color:#15803d; }
.s-saute   { background:#fff1f2; border:2px solid #f87171; color:#be123c; }
.s-plating { background:#faf5ff; border:2px solid #c084fc; color:#7e22ce; }
.s-pastry  { background:#fefce8; border:2px solid #fbbf24; color:#92400e; }
.s-freezer { background:#eff6ff; border:2px solid #38bdf8; color:#0369a1; }
.s-other   { background:#f8fafc; border:2px solid #cbd5e0; color:#475569; }

.prep-item-card {
  background:#f8fafc; border-radius:6px; padding:5px 8px;
  display:flex; align-items:center; gap:6px;
  border-left:3px solid #e2e8f0;
}
.prep-item-card.done { opacity:0.3; border-left-color:#22c55e; }
.pi-dot { width:6px; height:6px; border-radius:50%; background:#cbd5e0; flex-shrink:0; }
.prep-item-card.done .pi-dot { background:#22c55e; }
.pi-name { font-size:12px; font-weight:700; color:#2d3748; }
.prep-item-card.done .pi-name { text-decoration:line-through; color:#a0aec0; }
.prep-more { font-size:10px; color:#a0aec0; font-weight:600; padding:3px 8px; }

/* ── RIGHT: STAFF LEADERBOARD ── */
#panel-right { }
.staff-card {
  background:#f8fafc; border-radius:8px; padding:8px 10px;
  display:flex; align-items:center; gap:9px;
  border:1px solid #e2e8f0;
}
.staff-rank { font-size:14px; font-weight:900; color:#e2e8f0; width:18px; flex-shrink:0; text-align:center; }
.staff-rank.top1 { color:#f59e0b; }
.staff-rank.top2 { color:#94a3b8; }
.staff-rank.top3 { color:#cd7f32; }
.s-avatar {
  width:34px; height:34px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:13px; font-weight:800; color:#fff; flex-shrink:0; overflow:hidden;
  position:relative;
}
.s-avatar img { width:100%; height:100%; object-fit:cover; }
.online-dot {
  position:absolute; bottom:0; right:0;
  width:9px; height:9px; border-radius:50%; background:#22c55e;
  border:2px solid #fff;
}
.s-info { flex:1; min-width:0; }
.s-name { font-size:14px; font-weight:800; color:#1a202c; }
.s-station { font-size:10px; color:#a0aec0; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.s-prep-count {
  font-family:'JetBrains Mono',monospace; font-size:20px; font-weight:700;
  color:#3b82f6; flex-shrink:0;
}
.s-prep-label { font-size:9px; color:#a0aec0; text-align:center; }

/* ── CHAT PANEL ── */
.chat-msg {
  background:#f8fafc; border-radius:8px; padding:8px 10px;
  border-left:3px solid #3b82f6; margin-bottom:0;
}
.chat-msg.pinned { border-left-color:#f59e0b; background:#fffbeb; }
.chat-name { font-size:10px; font-weight:800; color:#3b82f6; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:3px; display:flex; align-items:center; gap:6px; }
.chat-name .chat-time { font-size:9px; color:#a0aec0; font-weight:500; text-transform:none; letter-spacing:0; }
.chat-text { font-size:14px; font-weight:500; color:#1a202c; line-height:1.4; }
.chat-pin { font-size:9px; color:#f59e0b; }

/* ── STAFF CHIPS IN HEADER ── */
.h-staff-chips { display:flex; gap:4px; align-items:center; margin-right:8px; }
.h-chip {
  display:flex; align-items:center; gap:4px;
  background:#2d3748; border-radius:20px; padding:3px 8px 3px 4px;
  font-size:10px; font-weight:700; color:#e2e8f0;
}
.h-chip-avatar {
  width:18px; height:18px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:8px; font-weight:800; color:#fff; overflow:hidden; flex-shrink:0;
}
.h-chip-avatar img { width:100%; height:100%; object-fit:cover; }
.h-online-dot { width:5px; height:5px; border-radius:50%; background:#22c55e; flex-shrink:0; }

/* offline staff */
.staff-card.offline { opacity:0.4; }
.staff-card.offline .s-prep-count { color:#cbd5e0; }

/* ── FOOTER ── */
#footer {
  background:#1a202c; height:56px; flex-shrink:0;
  display:flex; align-items:center; overflow:hidden;
}
.f-label {
  padding:0 14px; font-size:14px; font-weight:900; letter-spacing:0.15em;
  text-transform:uppercase; color:#f59e0b; border-right:1px solid #2d3748;
  flex-shrink:0; height:100%; display:flex; align-items:center;
}
.f-ticker { flex:1; overflow:hidden; display:flex; align-items:center; padding:0 12px; }
.f-inner  { white-space:nowrap; font-size:24px; color:#e2e8f0; font-weight:700; display:inline-block; animation:ticker 40s linear infinite; }
@keyframes ticker { 0%{transform:translateX(100vw)} 100%{transform:translateX(-100%)} }


/* ── SCREEN FADE ── */
.fade { animation:fadeIn 0.4s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:none} }
</style>
</head>
<body>
<div id="root">

  <!-- HEADER -->
  <div id="header">
    <div class="h-brand">Brigade</div>
    <div class="h-divider"></div>

    <div class="h-date" id="hdate">--</div>
    <div class="h-staff-chips" id="h-staff-chips"></div>
    <div class="svc-pill svc-before" id="svc-pill">
      <div class="svc-dot" id="svc-dot"></div>
      <span id="svc-text">--</span>
    </div>
    <div class="alert-pill ap-ok" id="alert-pill">
      <span id="alert-pill-text">No Alerts</span>
    </div>
  </div>

  <!-- BODY -->
  <div id="body">

    <!-- LEFT: SALES -->
    <div class="card" id="panel-left">
      <div class="card-head">
        <div class="card-title" id="sales-title">Sales</div>
        <div class="sales-tabs" id="sales-tabs">
          <div class="stab active"></div>
          <div class="stab"></div>
          <div class="stab"></div>
          <div class="stab"></div>
        </div>
      </div>
      <div class="card-body" id="sales-body"></div>
    </div>

    <div class="card" id="panel-centre">
      <div class="card-head">
        <div class="card-title">Today's Prep</div>
        <div class="card-sub" id="prep-sub">loading…</div>
      </div>
      <div id="prep-grid"></div>
    </div>

    <!-- RIGHT: KITCHEN CHAT -->
    <div class="card" id="panel-right">
      <div class="card-head">
        <div class="card-title">Kitchen Chat</div>
        <div class="card-sub" id="chat-sub">live</div>
      </div>

  </div>

  <!-- FOOTER -->

  </div>

</div>
<script>
const SUPABASE_URL = 'https://ydqmumpytgrlceuinoqt.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlkcW11bXB5dGdybGNldWlub3F0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5MzcyOTUsImV4cCI6MjA5NDUxMzI5NX0.MSIKL4nCOxK8YFFTkt9AbFGViiwl-KEhHy6cL25gnKc';
const supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── SERVICE HOURS ──
// Mon-Thu: 11:00-21:00 / Fri-Sat: 11:00-22:00 / Sun: closed
const SVC_OPEN = 11 * 60;
function svcClose(dow) {
  return (dow >= 5) ? 22 * 60 : 21 * 60; // Fri=5, Sat=6
}

function getChicagoTime() {
  const s = new Date().toLocaleString('en-US', { timeZone: 'America/Chicago', hour:'numeric', minute:'numeric', weekday:'short', hour12:false });
  const parts = new Date().toLocaleString('en-US', { timeZone:'America/Chicago' });
  const d = new Date(parts);
  return { h: d.getHours(), m: d.getMinutes(), dow: d.getDay(), totalMin: d.getHours()*60+d.getMinutes() };
}

function updateServicePill() {
  const { h, m, dow, totalMin } = getChicagoTime();
  const close = svcClose(dow);
  const pill = document.getElementById('svc-pill');
  const dot  = document.getElementById('svc-dot');
  const txt  = document.getElementById('svc-text');

  if (dow === 0) { // Sunday closed
    pill.className = 'svc-pill svc-before';
    dot.className = 'svc-dot';
    txt.textContent = 'Closed Sunday';
    return;
  }

  const minsToOpen  = SVC_OPEN - totalMin;
  const minsToClose = close - totalMin;

  if (totalMin < SVC_OPEN) {
    pill.className = 'svc-pill svc-before';
    dot.className = 'svc-dot';
    const hh = Math.floor(minsToOpen/60), mm = minsToOpen%60;
    txt.textContent = hh > 0 ? `Opens in ${hh}h ${mm}m` : `Opens in ${mm}m`;
  } else if (totalMin >= close) {
    pill.className = 'svc-pill svc-before';
    dot.className = 'svc-dot';
    txt.textContent = 'Service ended';
  } else if (minsToClose <= 60) {
    pill.className = 'svc-pill svc-closing';
    dot.className = 'svc-dot svc-blink';
    txt.textContent = `Closing in ${minsToClose}m`;
  } else {
    pill.className = 'svc-pill svc-open';
    dot.className = 'svc-dot svc-blink';
    const hh = Math.floor(minsToClose/60), mm = minsToClose%60;
    txt.textContent = `In service · ${hh}h ${mm}m left`;
  }
}

// ── CLOCK ──
function tick() {
  const now = new Date();
  const t = now.toLocaleTimeString('en-US',{timeZone:'America/Chicago',hour:'2-digit',minute:'2-digit',hour12:false});
  const d = now.toLocaleDateString('en-US',{timeZone:'America/Chicago',weekday:'long',month:'short',day:'numeric'});
  document.getElementById('clock').textContent = t;
  document.getElementById('hdate').textContent = d;
  updateServicePill();
}
setInterval(tick, 1000); tick();

function todayISO() {
  const d = new Date(new Date().toLocaleString('en-US',{timeZone:'America/Chicago'}));
  return d.toISOString().slice(0,10);
}
function yesterdayISO() {
  const d = new Date(new Date().toLocaleString('en-US',{timeZone:'America/Chicago'}));
  d.setDate(d.getDate()-1); return d.toISOString().slice(0,10);
}

// ── STATE ──
let salesScreen = 0;
let salesData = { ySum:null, yItems:[], weekTop:[], expected:[], bestByCat:[] };
let prepTasks=[], prepDone=new Set();
let presenceData=[], prepLogData=[];
let alerts=[], chatMessages=[];

const STATION_MAP = {
  'Oven Station':'s-oven','Fresh Pasta Station':'s-fpasta',
  'Pasta Station':'s-pasta','Salad Station':'s-salad',
  'Sauté Station':'s-saute','Saucier Station':'s-saute',
  'Plating Station':'s-plating','Pastry Station':'s-pastry','Freezer':'s-freezer'
};
const AVATAR_COLORS = ['#3b82f6','#10b981','#8b5cf6','#f59e0b','#ef4444','#14b8a6','#f97316'];

// ── LOAD ──
async function loadAll() {
  await Promise.all([loadSales(), loadPrep(), loadPresence(), loadAlerts(), loadChat()]);
}

async function loadSales() {
  const yest = yesterdayISO();
  const today = todayISO();

  // Yesterday summary + top food items
  const {data:ySum} = await supa.from('pos_daily_summary').select('net_sales,gross_sales,bill_count').eq('sale_date',yest).maybeSingle();
  const {data:yItemsRaw} = await supa.from('pos_sales_by_item').select('menu_item,quantity,menu_group').eq('sale_date',yest).eq('sales_category','Food').order('quantity',{ascending:false}).limit(20);
  const SKIP_YITEMS = ['Tea','Water','Lemonade','Coffee','Espresso','Diet Pepsi','Pepsi',
    'Sprite','Dr Pepper','Topo Chico','Cappuccino','San Pellegrino','Root Beer',
    'Bush NA Beer','Crodino N/a Spritz','N/A Prosecco','Decaf Coffe','Acqua Panna Still Water',
    'Gluten Free Bread','Gift Card','Open Food'];
  const yItems = (yItemsRaw||[]).filter(r=>!SKIP_YITEMS.includes(r.menu_item)).slice(0,6);

  // This week top food (last 7 days, only clean days)
  const weekStart = (() => { const d=new Date(); d.setDate(d.getDate()-7); return d.toISOString().slice(0,10); })();
  const {data:wItems} = await supa.from('pos_sales_by_item').select('menu_item,quantity,sale_date').gte('sale_date',weekStart).eq('sales_category','Food');
  // Find clean dates (total daily qty < 5000)
  const dayTotals={};
  (wItems||[]).forEach(r=>{ dayTotals[r.sale_date]=(dayTotals[r.sale_date]||0)+Number(r.quantity); });
  const cleanDays = new Set(Object.entries(dayTotals).filter(([,q])=>q<5000).map(([d])=>d));
  const SKIP_ITEMS_TOP = ['Tea','Water','Lemonade','Coffee','Espresso','Diet Pepsi','Pepsi',
    'Sprite','Dr Pepper','Topo Chico','Cappuccino','San Pellegrino','Root Beer',
    'Bush NA Beer','Crodino N/a Spritz','N/A Prosecco','Decaf Coffe','Acqua Panna Still Water',
    'Gluten Free Bread','Gift Card','Open Food'];
  const wMap={};
  (wItems||[]).filter(r=>cleanDays.has(r.sale_date) && !SKIP_ITEMS_TOP.includes(r.menu_item))
    .forEach(r=>{ if(!wMap[r.menu_item]) wMap[r.menu_item]=0; wMap[r.menu_item]+=Number(r.quantity); });
  const weekTop = Object.entries(wMap).map(([n,q])=>({n,q})).sort((a,b)=>b.q-a.q).slice(0,6);

  // Expected tonight: avg per DOW — only on CLEAN dates
  // DOW calcolato in CDT per evitare timezone mismatch sul browser TV
  const chicagoNow = new Date(new Date().toLocaleString('en-US',{timeZone:'America/Chicago'}));
  const dow = chicagoNow.getDay(); // 0=Sun,1=Mon...6=Sat
  const {data:allItems} = await supa.from('pos_sales_by_item').select('menu_item,quantity,sale_date').eq('sales_category','Food').lt('sale_date',today);
  // Compute day totals to identify clean dates (no aggregate CSVs)
  const allDayTotals={};
  (allItems||[]).forEach(r=>{ allDayTotals[r.sale_date]=(allDayTotals[r.sale_date]||0)+Number(r.quantity); });
  const allCleanDays = new Set(Object.entries(allDayTotals).filter(([,q])=>q<5000).map(([d])=>d));
  // Parse DOW from date string directly (YYYY-MM-DD) to avoid browser timezone issues
  function dateDOW(dateStr) {
    const [y,m,d] = dateStr.split('-').map(Number);
    return new Date(y, m-1, d).getDay();
  }
  const dowMap={};
  (allItems||[]).filter(r => allCleanDays.has(r.sale_date) && dateDOW(r.sale_date) === dow)
  .forEach(r=>{
    if(!dowMap[r.menu_item]) dowMap[r.menu_item]=[];
    dowMap[r.menu_item].push(Number(r.quantity));
  });
  const expected = Object.entries(dowMap)
    .map(([n,qs])=>({n, avg:Math.round(qs.reduce((a,b)=>a+b,0)/qs.length), days:qs.length}))
    .filter(x=>x.avg>=1 && x.days>=1)
    .sort((a,b)=>b.avg-a.avg).slice(0,8);

  // Best by category last week
  // Best by category: ultimi 7 giorni (stessi dati disponibili)
  const {data:catItems} = await supa.from('pos_sales_by_item').select('menu_item,menu_group,quantity').gte('sale_date',weekStart).eq('sales_category','Food');
  // Map secondary categories to primary ones — data is merged, category hidden
  const GROUP_REMAP = {
    'Happy hours':    'Antipasti/appetizer',  // calamari, caprese etc → antipasti
    'Kids menu':      null,                   // pasta kids → Pasta (by item name match)
    'Sides':          null,                   // sides shown separately, skip
    'Soup':           null,                   // skip
    'NA Beverages':   null,                   // skip
    'Mocktail':       null,                   // skip
    'Lunch':          null,                   // skip
  };
  // Items in Kids menu that are pasta go to Pasta
  const KIDS_PASTA_GROUPS = ['Cacio e Pepe Half','Cacio & Pepe Half Child','Fettuccine Alla Vodka',
    'La N.4 Half','Penne Midnight','Spaghetti  al Pomodoro Half','Spaghetti Al Ragu','The PeeWee'];
  // Excluded from all stats (beverages, non-food)
  const SKIP_GROUPS = ['NA Beverages','Mocktail','Lunch','Soup'];
  // Also exclude specific items that are beverages even in Food category
  const SKIP_ITEMS = ['Tea','Water','Lemonade','Coffee','Espresso','Diet Pepsi','Pepsi',
    'Sprite','Dr Pepper','Topo Chico','Cappuccino','San Pellegrino','Root Beer',
    'Bush NA Beer','Crodino N/a Spritz','N/A Prosecco','Decaf Coffe','Acqua Panna Still Water'];

  const catMap={};
  (catItems||[]).forEach(r=>{
    // Skip beverage items regardless of group
    if(SKIP_ITEMS.includes(r.menu_item)) return;
    let g = r.menu_group||'Other';
    // Skip non-food groups entirely
    if(SKIP_GROUPS.includes(g)) return;
    // Remap Happy hours → Antipasti
    if(g === 'Happy hours') g = 'Antipasti/appetizer';
    // Remap Kids menu pasta → Pasta
    if(g === 'Kids menu') g = 'Pasta';
    if(!catMap[g]) catMap[g]={};
    catMap[g][r.menu_item]=(catMap[g][r.menu_item]||0)+Number(r.quantity);
  });
  // ── MODIFIER → SIDES: leggi pos_modifiers e somma usando pos_item_aliases ──
  const {data:modItems} = await supa.from('pos_modifiers')
    .select('modifier,quantity_sold')
    .gte('sale_date', weekStart);
  const {data:aliases} = await supa.from('pos_item_aliases')
    .select('alias_name,canonical_name,portion_factor,category')
    .eq('category','side')
    .eq('source','modifier');

  if (aliases && modItems) {
    // Build alias lookup: alias_name → {canonical, factor}
    const aliasMap = {};
    aliases.forEach(a => { aliasMap[a.alias_name.toLowerCase()] = a; });

    // Sum modifier quantities into Sides catMap
    if (!catMap['Sides']) catMap['Sides'] = {};
    modItems.forEach(m => {
      const alias = aliasMap[m.modifier?.toLowerCase()];
      if (!alias) return;
      const qty = Number(m.quantity_sold) * alias.portion_factor;
      const key = alias.canonical_name;
      catMap['Sides'][key] = (catMap['Sides'][key]||0) + qty;
    });

    // Also add item-source aliases (sides sold as menu items with different portion)
    const {data:itemAliases} = await supa.from('pos_item_aliases')
      .select('alias_name,canonical_name,portion_factor')
      .eq('category','side').eq('source','item');
    if (itemAliases) {
      itemAliases.forEach(a => {
        const found = catMap['Sides']?.[a.alias_name];
        if (found) {
          // Move from alias_name to canonical_name with correct factor
          const qty = found * a.portion_factor;
          catMap['Sides'][a.canonical_name] = (catMap['Sides'][a.canonical_name]||0) + qty;
          if (a.alias_name !== a.canonical_name) delete catMap['Sides'][a.alias_name];
        }
      });
    }
  }

  // ── PROTEINS: somma modifier da pos_modifiers usando pos_item_aliases ──
  const {data:protAliases} = await supa.from('pos_item_aliases')
    .select('alias_name,canonical_name,portion_factor')
    .eq('category','protein').eq('source','modifier');
  if (protAliases && modItems) {
    const protMap = {};
    protAliases.forEach(a => { protMap[a.alias_name.toLowerCase()] = a; });
    if (!catMap['Proteins']) catMap['Proteins'] = {};
    modItems.forEach(m => {
      const alias = protMap[m.modifier?.toLowerCase()];
      if (!alias) return;
      const qty = Number(m.quantity_sold) * alias.portion_factor;
      catMap['Proteins'][alias.canonical_name] = (catMap['Proteins'][alias.canonical_name]||0) + qty;
    });
  }

  // Per ogni categoria: top 2 items
  const bestByCat = Object.entries(catMap).map(([cat,items])=>{
    const top2 = Object.entries(items).sort((a,b)=>b[1]-a[1]).slice(0,2).map(([n,q])=>({n,q:Math.round(q)}));
    return {cat, top2};
  }).filter(x=>x.top2.length>0).sort((a,b)=>a.cat.localeCompare(b.cat));

  salesData = {ySum, yItems:yItems||[], weekTop, expected, bestByCat};
  renderSales();
}

async function loadPrep() {
  const {data:tasks} = await supa.from('prep_tasks').select('*').eq('archived',false).order('category').order('name');
  prepTasks = tasks||[];
  const today = todayISO();
  const {data:logs} = await supa.from('prep_log').select('item,user_name').gte('created_at',today+'T00:00:00+00:00');
  prepDone = new Set((logs||[]).map(l=>l.item));
  prepLogData = logs||[];
  renderPrep();
}

async function loadPresence() {
  const {data} = await supa.from('user_presence').select('*').order('last_seen',{ascending:false});
  presenceData = data||[];
  renderStaff();
}

async function translateToEn(text) {
  try {
    const r = await fetch(`${SUPABASE_URL}/functions/v1/ai-translate`, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${SUPABASE_ANON_KEY}`},
      body: JSON.stringify({text, targetLang:'en', literal:true})
    });
    const j = await r.json();
    return j.translated || text;
  } catch(e) { return text; }
}

async function loadAlerts() {
  const {data} = await supa.from('alerts').select('message,created_by,priority').eq('is_active',true).order('created_at',{ascending:false});
  const raw = data||[];
  // Translate all messages to English
  alerts = await Promise.all(raw.map(async a => ({
    ...a,
    message: await translateToEn(a.message)
  })));
  renderFooter();
  const pill = document.getElementById('alert-pill');
  const txt  = document.getElementById('alert-pill-text');
  if (alerts.length) {
    pill.className = 'alert-pill ap-warn';
    txt.textContent = `${alerts.length} Alert${alerts.length>1?'s':''}`;
  } else {
    pill.className = 'alert-pill ap-ok';
    txt.textContent = 'No Alerts';
  }
}



async function loadChat() {
  const {data} = await supa.from('messages')
    .select('user_name,text,created_at,pinned,channel')
    .order('created_at',{ascending:false})
    .limit(20);
  const raw = (data||[])
    .filter(m => !['sistema','system','Sistema','SISTEMA'].includes(m.user_name))
    .slice(0,5)
    .reverse();
  // Translate all messages to English
  chatMessages = await Promise.all(raw.map(async m => ({
    ...m,
    text: await translateToEn(m.text||'')
  })));
  renderChat();
}

// ── RENDER SALES ──
const SALES_TITLES = ['Yesterday', 'Last Week', 'Expected Tonight', 'Best by Category'];
function renderSales() {
  const tabs = document.querySelectorAll('.stab');
  tabs.forEach((t,i) => t.classList.toggle('active', i===salesScreen));
  document.getElementById('sales-title').textContent = SALES_TITLES[salesScreen];
  const body = document.getElementById('sales-body');
  body.className = 'card-body fade';
  if (salesScreen===0) renderYesterday(body);
  else if (salesScreen===1) renderWeekTop(body);
  else if (salesScreen===2) renderExpected(body);
  else renderBestByCat(body);
}
setInterval(()=>{ salesScreen=(salesScreen+1)%4; renderSales(); }, 20000);

function renderYesterday(el) {
  const s = salesData.ySum;
  const yest = yesterdayISO();
  const day = new Date(yest+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
  if (!s) { el.innerHTML=`<div style="color:#a0aec0;font-size:13px">No data for ${day}</div>`; return; }
  el.innerHTML = `
    <div>
      <div class="big-label">${day}</div>
      <div class="big-num">${s.bill_count} <span style="font-size:16px;color:#a0aec0;font-weight:500">bills</span></div>

    </div>
    <div class="sdivider"></div>
    <div class="section-label">Top Food</div>
    ${salesData.yItems.map((r,i)=>`
      <div class="rank-row">
        <div class="rank-n">${i+1}</div>
        <div class="rank-nm">${r.menu_item}</div>
        <div class="rank-q">${Math.round(r.quantity)}</div>
      </div>`).join('')}`;
}

function renderWeekTop(el) {
  el.innerHTML = `
    <div class="section-label">Last 7 Days — Food</div>
    ${salesData.weekTop.map((r,i)=>`
      <div class="rank-row">
        <div class="rank-n">${i+1}</div>
        <div class="rank-nm">${r.n}</div>
        <div class="rank-q">${r.q}</div>
      </div>`).join('')}`;
}

function renderExpected(el) {
  const dow=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][new Date().getDay()];
  if (!salesData.expected.length) {
    el.innerHTML='<div style="color:#a0aec0;font-size:13px">Not enough historical data</div>'; return;
  }
  el.innerHTML = `
    <div class="section-label">Avg for ${dow}</div>
    ${salesData.expected.map(r=>`
      <div class="exp-row">
        <div class="exp-nm">${r.n}</div>
        <div class="exp-q">${r.avg}</div>
      </div>`).join('')}`;
}

let bestCatScrollTimer = null;
function renderBestByCat(el) {
  if (!salesData.bestByCat||!salesData.bestByCat.length) {
    el.innerHTML='<div style="color:#a0aec0;font-size:13px">No category data</div>'; return;
  }
  if (bestCatScrollTimer) { clearInterval(bestCatScrollTimer); bestCatScrollTimer = null; }

  const CAT_LABELS = {
    'Antipasti/appetizer': 'Appetizers',
    'Pasta': 'Pasta',
    'Secondi/entrees': 'Entrees',
    'Insalate/salad': 'Salad',
    'Dolcezze/dessert': 'Desserts',
    'Sides': 'Sides',
    'Proteins': 'Proteins Add-on',
  };

  const html = salesData.bestByCat.map(function({cat,top2}){
    const label = CAT_LABELS[cat] || cat;
    const color = cat==='Proteins' ? '#f59e0b' : cat==='Sides' ? '#10b981' : '#7c3aed';
    return '<div style="margin-bottom:10px;flex-shrink:0">' +
      '<div style="font-size:11px;font-weight:800;color:'+color+';text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px;padding-bottom:3px;border-bottom:2px solid '+color+'44">'+label+'</div>' +
      top2.map(function(r,i){
        return '<div class="rank-row" style="padding:4px 0">' +
          '<div class="rank-n">'+(i+1)+'</div>' +
          '<div class="rank-nm">'+r.n+'</div>' +
          '<div class="rank-q" style="font-size:13px;font-weight:800;color:#3b82f6">'+r.q+'</div>' +
          '</div>';
      }).join('') +
      '</div>';
  }).join('');

  el.innerHTML =
    '<div class="section-label" style="margin-bottom:8px;flex-shrink:0">Last 7 Days</div>' +
    '<div id="cat-scroll-wrap" style="flex:1;overflow:hidden;position:relative;">' +
    '<div id="cat-scroll-inner" style="position:absolute;top:0;left:0;right:0;transition:transform 0.8s ease;">' +
    html + '</div></div>';

  setTimeout(function(){
    var wrap = document.getElementById('cat-scroll-wrap');
    var inner = document.getElementById('cat-scroll-inner');
    if (!wrap || !inner) return;
    var wrapH = wrap.offsetHeight;
    var innerH = inner.offsetHeight;
    if (innerH <= wrapH) return;
    var pos = 0;
    var maxPos = innerH - wrapH;
    bestCatScrollTimer = setInterval(function(){
      pos += 55;
      if (pos > maxPos) pos = 0;
      inner.style.transform = 'translateY(-' + pos + 'px)';
    }, 2500);
  }, 600);
}


// ── RENDER PREP ──
function renderPrep() {
  const total = prepTasks.length;
  const done  = prepTasks.filter(t=>prepDone.has(t.name)).length;
  document.getElementById('prep-sub').textContent = `${done}/${total} done`;

  const byStation = {};
  prepTasks.forEach(t => {
    const s = t.category||'Other';
    if (!byStation[s]) byStation[s] = [];
    byStation[s].push(t);
  });

  const stations = Object.keys(byStation);
  // 3 columns
  const cols = [[],[],[]];
  stations.forEach((s,i) => cols[i%3].push(s));

  document.getElementById('prep-grid').innerHTML = cols.map(colSt => `
    <div class="st-col">
      ${colSt.map(s => {
        const items = byStation[s];
        const cls = STATION_MAP[s]||'s-other';
        const short = s.replace(' Station','').replace(' station','');
        const stDone = items.filter(i=>prepDone.has(i.name)).length;
        const top3 = items.slice(0,3);
        const remaining = items.length - 3;
        return `
          <div class="st-head ${cls}">
            <span>${short}</span>
            <span class="st-count">${stDone}/${items.length}</span>
          </div>
          ${top3.map(item=>`
            <div class="prep-item-card ${prepDone.has(item.name)?'done':''}">
              <div class="pi-dot"></div>
              <div class="pi-name">${item.name}</div>
            </div>`).join('')}
          ${remaining>0?`<div class="prep-more">+${remaining} more</div>`:''}
        `;
      }).join('')}
    </div>`).join('');
}

// ── RENDER STAFF HEADER CHIPS ──
function renderStaff() {
  const now = Date.now();
  const online = presenceData.filter(u => (now - new Date(u.last_seen).getTime()) < 2*60*1000);
  const prepByUser = {};
  prepLogData.forEach(l => { if(!prepByUser[l.user_name]) prepByUser[l.user_name]=0; prepByUser[l.user_name]++; });

  const chips = document.getElementById('h-staff-chips');
  if (!chips) return;
  chips.innerHTML = online.map(u => {
    const colorIdx = u.user_name.charCodeAt(0) % AVATAR_COLORS.length;
    const bg = AVATAR_COLORS[colorIdx];
    const initials = u.user_name.slice(0,1).toUpperCase();
    const count = prepByUser[u.user_name]||0;
    return `<div class="h-chip">
      <div class="h-chip-avatar" style="background:${bg}">
        ${u.photo_url?`<img src="${u.photo_url}" onerror="this.parentElement.textContent='${initials}'">`:initials}
      </div>
      ${u.user_name} ${count>0?'·'+count:''}
      <div class="h-online-dot"></div>
    </div>`;
  }).join('');
}

// ── APPEND SINGOLO MESSAGGIO CHAT (realtime) ──
async function appendChatMessage(msg) {
  // Salta messaggi di sistema
  if (['sistema','system','Sistema','SISTEMA'].includes(msg.user_name)) return;
  // Traduci solo questo messaggio
  const translated = await translateToEn(msg.text || '');
  const newMsg = { ...msg, text: translated };
  // Aggiungi in fondo, rimuovi il più vecchio se > 5
  chatMessages.push(newMsg);
  if (chatMessages.length > 5) chatMessages.shift();
  renderChat();
}

// ── RENDER CHAT ──
function renderChat() {
  const body = document.getElementById('chat-body');
  if (!body) return;
  if (!chatMessages.length) {
    body.innerHTML='<div style="color:#a0aec0;font-size:13px;padding:10px">No messages yet</div>';
    return;
  }
  body.innerHTML = chatMessages.map(m => {
    const colorIdx = m.user_name.charCodeAt(0) % AVATAR_COLORS.length;
    const nameColor = ['#3b82f6','#10b981','#8b5cf6','#f59e0b','#ef4444','#14b8a6','#f97316'][colorIdx];
    const t = new Date(m.created_at).toLocaleTimeString('en-US',{timeZone:'America/Chicago',hour:'2-digit',minute:'2-digit',hour12:true});
    return `<div class="chat-msg${m.pinned?' pinned':''}">
      <div class="chat-name" style="color:${nameColor}">
        ${m.pinned?'<span class="chat-pin">📌</span>':''}
        ${m.user_name}
        <span class="chat-time">${t}</span>
      </div>
      <div class="chat-text">${m.text||''}</div>
    </div>`;
  }).join('');
}

// ── RENDER FOOTER ──
function renderFooter() {
  const inner = document.getElementById('f-inner');
  inner.textContent = alerts.length
    ? alerts.map(a=>a.message||'').join('   ·   ')
    : 'Zenos on the Square — No active alerts';
  inner.style.animation='none'; inner.offsetHeight; inner.style.animation='';
}

// ── BOOT ──
async function checkDisplayActive() {
  try {
    const {data} = await supa.from('settings').select('value').eq('key','display_active').maybeSingle();
    const active = !data || data.value === 'true';
    const root = document.getElementById('root');
    const disabled = document.getElementById('display-disabled');
    if (!active) {
      if (root) root.style.display = 'none';
      if (!disabled) {
        const el = document.createElement('div');
        el.id = 'display-disabled';
        el.style.cssText = 'position:fixed;inset:0;background:#0a0e14;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#2d3748;font-family:Inter,sans-serif;';
        el.innerHTML = '<div style="font-size:48px;margin-bottom:16px;">📺</div><div style="font-size:18px;font-weight:700;">Display disabled by Chef</div>';
        document.body.appendChild(el);
      }
    } else {
      if (root) root.style.display = 'flex';
      if (disabled) disabled.remove();
    }
  } catch(e) {}
}

// ── Settings realtime con riconnessione automatica ──
var _settingsChannel = null;
function startSettingsRealtime() {
  if (_settingsChannel) { try { supa.removeChannel(_settingsChannel); } catch(e){} }
  _settingsChannel = supa.channel('settings-rt-' + Date.now())
    .on('postgres_changes', {event:'*', schema:'public', table:'settings'}, async function() {
      await checkDisplayActive();
    })
    .subscribe(function(status) {
      if (status === 'CLOSED' || status === 'CHANNEL_ERROR') {
        setTimeout(startSettingsRealtime, 5000);
      }
    });
}

async function boot() {
  await checkDisplayActive();
  await loadAll();
  setInterval(loadAll, 5*60*1000);
  // Polling fallback — controlla display_active ogni 30s indipendentemente dal realtime
  setInterval(checkDisplayActive, 30000);
  // Realtime presence
  supa.channel('presence-rt')
    .on('postgres_changes',{event:'*',schema:'public',table:'user_presence'}, loadPresence)
    .subscribe();
  // Realtime chat — solo il messaggio nuovo, niente reload completo
  supa.channel('chat-rt')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'}, async function(payload){
      if (payload.new) await appendChatMessage(payload.new);
    })
    .subscribe();
  // Realtime alerts
  supa.channel('alerts-rt')
    .on('postgres_changes',{event:'*',schema:'public',table:'alerts'}, async function(){ await loadAlerts(); })
    .subscribe();
  // Realtime settings — TV on/off con riconnessione automatica
  startSettingsRealtime();
}
boot();
</script>
