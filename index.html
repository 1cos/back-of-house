<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Back of House — v29</title>
<meta name="theme-color" content="#059669">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Back of House">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="manifest" href="./manifest.json">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body{font-family:Inter,system-ui,sans-serif}
  .glass{background:rgba(255,255,255,0.6);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:0.5px solid rgba(59,130,246,0.18);border-radius:18px;}
  .glass-card{background:rgba(255,255,255,0.55);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1.5px solid rgba(59,130,246,0.15);border-radius:16px;}
  .tab-active{color:#059669} .tab-active svg{stroke:#059669}
  .scrollbar-hide::-webkit-scrollbar{display:none}
  @keyframes marquee{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}
  .animate-marquee{animation:marquee 25s linear infinite}
  .snap-y{scroll-snap-type:y mandatory} .snap-start{scroll-snap-align:start}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  .animate-pulse{animation:pulse 1.5s ease-in-out infinite}
  @keyframes flyOut{0%{transform:scale(1);opacity:1}50%{transform:scale(1.1) translateY(-10px);opacity:0.8}100%{transform:scale(0.5) translateY(-30px);opacity:0}}
  .fly-out{animation:flyOut 0.5s ease-out forwards}
  @keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
</style>
</head>

<body style="background:linear-gradient(160deg,#eff6ff 0%,#dbeafe 60%,#e0f2fe 100%);min-height:100vh;">

<!-- LOGIN — PIN KEYPAD -->
<div id="login" class="min-h-screen flex items-center justify-center p-4" style="background:linear-gradient(160deg,#1e3a5f 0%,#1e40af 100%);">
  <div style="width:100%;max-width:340px;">
    <div style="text-align:center;margin-bottom:32px;">
      <div style="font-size:22px;font-weight:500;color:white;margin-bottom:4px;">Back of House</div>
      <div style="font-size:13px;color:rgba(255,255,255,0.5);">Zenos on the Square</div>
    </div>

    <!-- PIN dots -->
    <div id="pinDots" style="display:flex;justify-content:center;gap:14px;margin-bottom:32px;">
      <div class="pin-dot" style="width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);background:transparent;"></div>
      <div class="pin-dot" style="width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);background:transparent;"></div>
      <div class="pin-dot" style="width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);background:transparent;"></div>
      <div class="pin-dot" style="width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);background:transparent;"></div>
    </div>

    <!-- Keypad -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:280px;margin:0 auto;">
      <button class="pin-key" onclick="pinPress('1')">1</button>
      <button class="pin-key" onclick="pinPress('2')">2</button>
      <button class="pin-key" onclick="pinPress('3')">3</button>
      <button class="pin-key" onclick="pinPress('4')">4</button>
      <button class="pin-key" onclick="pinPress('5')">5</button>
      <button class="pin-key" onclick="pinPress('6')">6</button>
      <button class="pin-key" onclick="pinPress('7')">7</button>
      <button class="pin-key" onclick="pinPress('8')">8</button>
      <button class="pin-key" onclick="pinPress('9')">9</button>
      <div></div>
      <button class="pin-key" onclick="pinPress('0')">0</button>
      <button class="pin-key pin-del" onclick="pinDel()">⌫</button>
    </div>

    <p id="err" class="text-red-400 text-xs text-center mt-5 hidden"></p>
  </div>
</div>

<style>
.pin-key{height:70px;border-radius:50%;background:rgba(255,255,255,0.12);border:0.5px solid rgba(255,255,255,0.2);color:white;font-size:24px;font-weight:400;cursor:pointer;transition:background .15s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;-webkit-user-select:none;}
.pin-key:active{background:rgba(255,255,255,0.28);}
.pin-del{font-size:20px;}
</style>
<script>
function pinPress(d){if(typeof window._pinPress==='function')window._pinPress(d);}
function pinDel(){if(typeof window._pinDel==='function')window._pinDel();}
</script>

<div id="app" class="hidden min-h-screen flex flex-col" style="background:transparent;">
  <!-- Top bar -->
  <div class="sticky top-0 z-30 border-b" style="background:rgba(255,255,255,0.75);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-color:rgba(59,130,246,0.15);">
    <div class="max-w-md mx-auto px-3 h-14 flex items-center justify-between">
      <div class="font-bold text-[15px] flex items-center gap-1.5"><span>🍳</span><span>Back of House</span></div>
      <div class="flex items-center gap-2 text-sm">
        <span id="who" class="font-medium cursor-pointer" onclick="openProfile()" style="color:#3B82F6;"></span>
        <div id="online" class="flex -space-x-1"></div>
        <button id="alertBtn" class="hidden px-3 py-2 bg-red-600 text-white rounded-xl text-base">🚨</button>
        <button id="userMgrBtn" onclick="openUserManager()" class="hidden px-3 py-2 bg-slate-100 rounded-xl text-base">👥</button>
        <button id="pwdBtn" onclick="openChangePassword()" class="hidden px-3 py-2 bg-slate-100 rounded-xl text-base">🔑</button>
        <button id="out" class="px-3 py-2 bg-slate-100 rounded-xl font-medium">Esci</button>
      </div>
    </div>
  </div>

  <!-- News ticker -->
  <div id="newsBar" class="hidden bg-amber-100 border-b border-amber-200">
    <div class="max-w-md mx-auto px-3 py-1.5 flex items-center gap-2">
      <span class="text-xs font-bold text-amber-800 uppercase">NEWS</span>
      <div class="flex-1 overflow-hidden"><div id="newsScroll" class="whitespace-nowrap text-sm text-slate-700 animate-marquee"></div></div>
      <button id="newsManage" class="hidden text-xs px-2 py-1 bg-amber-600 text-white rounded-lg">Gest</button>
    </div>
  </div>

  <!-- Right rail -->
  <!-- Menu laterale rimosso — tutto nella bottom bar -->
  <!-- Badge chat mantenuto nel DOM per compatibilità JS -->
  <span id="badge" class="hidden fixed top-4 right-4 z-50 bg-red-500 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full font-bold"></span>

  <main class="flex-1 max-w-md w-full mx-auto pb-24" style="background:transparent;">

    <!-- HOME REFACTORED -->
    <section id="vh" class="px-3 pt-3 pb-4 space-y-3">

      <!-- SECTION 1: Service Updates -->
      <div style="background:rgba(255,255,255,0.6);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:0.5px solid rgba(59,130,246,0.18);border-radius:18px;overflow:hidden;">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;border-bottom:0.5px solid rgba(59,130,246,0.1);">
          <span style="font-size:10px;font-weight:500;color:#93c5fd;letter-spacing:.06em;text-transform:uppercase;">Service Updates</span>
          <button onclick="openServiceUpdates()" style="font-size:11px;color:#3B82F6;background:none;border:none;cursor:pointer;">View all</button>
        </div>
        <div id="serviceUpdatesList" style="padding:8px 14px;"></div>
      </div>

      <!-- Invoice button — solo admin -->
      <div id="invoiceSection" style="display:none;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
          <button onclick="openInvoiceImport()" style="background:rgba(255,255,255,0.6);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:0.5px solid rgba(59,130,246,0.18);border-radius:18px;padding:14px;text-align:left;cursor:pointer;">
            <div style="font-size:22px;margin-bottom:4px;">📷</div>
            <div style="font-size:13px;font-weight:500;color:#1e3a5f;">Import Invoice</div>
            <div style="font-size:11px;color:#93c5fd;margin-top:2px;">Photo or gallery</div>
          </button>
          <button onclick="openPurchaseHistory()" style="background:rgba(255,255,255,0.6);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:0.5px solid rgba(59,130,246,0.18);border-radius:18px;padding:14px;text-align:left;cursor:pointer;">
            <div style="font-size:22px;margin-bottom:4px;">📋</div>
            <div style="font-size:13px;font-weight:500;color:#1e3a5f;">Purchase History</div>
            <div style="font-size:11px;color:#93c5fd;margin-top:2px;">All invoices</div>
          </button>
        </div>
      </div>

      <!-- SECTION 2: Upcoming Demand -->
      <div style="background:rgba(255,255,255,0.6);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:0.5px solid rgba(59,130,246,0.18);border-radius:18px;overflow:hidden;">
        <div style="padding:10px 14px 8px;border-bottom:0.5px solid rgba(59,130,246,0.1);">
          <span style="font-size:10px;font-weight:500;color:#93c5fd;letter-spacing:.06em;text-transform:uppercase;">Upcoming Demand</span>
        </div>
        <div id="upcomingDemand" style="padding:8px 14px;">
          <div style="font-size:12px;color:#93c5fd;padding:4px 0;">No upcoming events</div>
        </div>
      </div>

      <!-- SECTION 3: Assigned Station -->
      <div style="background:rgba(255,255,255,0.6);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:0.5px solid rgba(59,130,246,0.18);border-radius:18px;overflow:hidden;">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;border-bottom:0.5px solid rgba(59,130,246,0.1);">
          <span style="font-size:10px;font-weight:500;color:#93c5fd;letter-spacing:.06em;text-transform:uppercase;">Your Station</span>
          <button onclick="document.querySelector('[data-t=m]').click()" style="font-size:11px;color:#3B82F6;background:none;border:none;cursor:pointer;">Go to prep →</button>
        </div>
        <div id="homeStationItems" style="padding:8px 14px;"></div>
      </div>

      <!-- Checklist chiusura stazioni — solo admin -->
      <div id="homeChecklistSection" style="background:rgba(255,255,255,0.6);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:0.5px solid rgba(59,130,246,0.18);border-radius:18px;overflow:hidden;">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;border-bottom:0.5px solid rgba(59,130,246,0.1);">
          <span id="homeChecklistLabel" style="font-size:10px;font-weight:500;color:#93c5fd;letter-spacing:.06em;text-transform:uppercase;">Checklist chiusura</span>
          <button id="homeOpenBtn" onclick="document.querySelector('[data-t=s]').click()" style="font-size:11px;color:#3B82F6;background:none;border:none;cursor:pointer;">Apri →</button>
        </div>
        <div id="homeStations" style="padding:8px 14px;display:flex;flex-wrap:wrap;gap:6px;"></div>
      </div>

      <!-- Briefing AI — solo admin -->
      <div id="homeBriefingSection" style="background:rgba(255,255,255,0.6);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:0.5px solid rgba(59,130,246,0.18);border-radius:18px;overflow:hidden;">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;border-bottom:0.5px solid rgba(59,130,246,0.1);">
          <span style="font-size:10px;font-weight:500;color:#93c5fd;letter-spacing:.06em;text-transform:uppercase;">Briefing AI</span>
          <button id="briefingRefreshBtn" onclick="refreshBriefing()" style="font-size:11px;color:#3B82F6;background:none;border:none;cursor:pointer;">Aggiorna</button>
        </div>
        <div id="briefingContent" style="padding:10px 14px;">
          <div class="animate-pulse h-4 bg-slate-100 rounded w-3/4 mb-2"></div>
          <div class="animate-pulse h-4 bg-slate-100 rounded w-full mb-2"></div>
          <div class="animate-pulse h-4 bg-slate-100 rounded w-2/3"></div>
        </div>
      </div>

    </section>

    <!-- PREP -->
    <section id="vm" class="hidden px-3 pt-2">
      <!-- Barra progresso urgenti -->
      <div id="urgentProgress" class="hidden mb-2 bg-white rounded-2xl border border-slate-200 p-3 shadow-sm">
        <div class="flex items-center justify-between mb-1.5">
          <span class="text-xs font-semibold text-red-600">🔴 <span id="urgentCount">0</span> urgenti</span>
          <span id="urgentTime" class="text-xs text-slate-400"></span>
        </div>
        <div class="h-2 bg-slate-100 rounded-full overflow-hidden">
          <div id="urgentBar" class="h-full bg-red-500 rounded-full transition-all duration-500" style="width:0%"></div>
        </div>
        <p id="urgentDone" class="hidden text-xs text-emerald-600 font-semibold text-center mt-1">✅ Tutte le urgenti completate!</p>
      </div>
      <div class="flex items-center gap-2 mb-2">
        <div id="stations" class="flex gap-2 overflow-x-auto scrollbar-hide flex-1"></div>
        <button id="toggleView" class="px-2.5 py-1.5 bg-white border border-slate-200 rounded-xl text-[11px] font-semibold shadow-sm">Feed</button>
        <button id="addPrepBtn" onclick="adminAdd()" class="hidden px-2.5 py-1.5 bg-emerald-600 text-white rounded-xl text-[11px] font-semibold shadow-sm">+ Prep</button>
      </div>
      <div id="grid" class="grid grid-cols-1 gap-2"></div>
      <div id="feed" class="hidden -mx-3 h-[calc(100vh-170px)] overflow-y-auto snap-y snap-mandatory bg-[#f5f7fb]"></div>
    </section>

    <!-- CHIUSURA -->
    <section id="vs" class="hidden px-3 pt-2">
      <div id="stations2" class="flex gap-2 overflow-x-auto scrollbar-hide pb-2"></div>
      <div id="checks" class="space-y-2 mt-2"></div>
      <div class="mt-4 pb-4">
        <button id="closeTurnBtn" onclick="closeTurn()" class="w-full py-3.5 bg-slate-900 text-white rounded-2xl font-semibold text-sm">Chiudi Turno</button>
      </div>
    </section>

    <!-- CHAT -->
    <section id="vc" class="hidden h-[calc(100vh-140px)] flex flex-col">
      <div id="msgs" class="flex-1 overflow-y-auto p-3 space-y-2 bg-slate-50"></div>
      <form id="f" class="p-3 bg-white border-t flex gap-2">
        <input id="txt" class="flex-1 px-3 py-2 bg-slate-100 rounded-xl" placeholder="Scrivi...">
        <button class="px-4 bg-slate-900 text-white rounded-xl">Invia</button>
      </form>
    </section>

    <!-- RICETTE -->
    <section id="vp" class="hidden px-3 pt-3">
      <div class="flex items-center justify-between mb-2">
        <h2 class="text-lg font-semibold">Ricette</h2>
        <div id="recipeAdminBtns" class="flex gap-2">
          <button onclick="openRecipeManager()" class="px-3 py-1.5 bg-emerald-600 text-white rounded-lg text-xs">Collega</button>
          <button onclick="openRecipeEditor()" class="px-3 py-1.5 bg-slate-900 text-white rounded-lg text-xs">+ Nuova</button>
        </div>
      </div>
      <div class="mb-2">
        <input id="recipeSearch" placeholder="Cerca ricetta..." class="w-full px-3 py-2 rounded-xl bg-white border text-sm" oninput="renderRecipes()">
      </div>
      <div id="recipeCats" class="flex gap-2 overflow-x-auto scrollbar-hide pb-2"></div>
      <div id="recipeGrid" class="grid grid-cols-2 gap-2.5 mt-2 pb-4"></div>
    </section>

    <!-- REPORT -->
    <section id="vr" class="hidden px-3 pt-3">
      <div class="flex items-center justify-between mb-3">
        <h2 id="reportTitle" class="text-lg font-semibold">Report</h2>
        <div class="flex gap-2 flex-wrap">
          <button id="btnToday" onclick="loadReport('today')" class="px-3 py-1.5 bg-slate-900 text-white rounded-lg text-sm">Oggi</button>
          <button id="btnWeek" onclick="loadReport('week')" class="px-3 py-1.5 bg-slate-200 rounded-lg text-sm">Settimana</button>
          <button id="btnPresence" onclick="showPresenceTab()" class="hidden px-3 py-1.5 bg-slate-200 rounded-lg text-sm">Presenze</button>
          <button id="btnAlertsLog" onclick="showAlertsLogTab()" class="hidden px-3 py-1.5 bg-slate-200 rounded-lg text-sm">Avvisi</button>
          <button id="btnPDF" onclick="exportPDF()" class="px-3 py-1.5 bg-green-600 text-white rounded-lg text-sm">PDF</button>
        </div>
      </div>
      <div id="reportOut" class="bg-white rounded-xl border p-3 text-sm overflow-auto min-h-[200px]">Seleziona Oggi o Settimana</div>
      <div id="presenceLogOut" class="hidden bg-white rounded-xl border p-3 text-sm overflow-auto min-h-[200px] mt-2"></div>
      <div id="alertsLogOut" class="hidden bg-white rounded-xl border p-3 text-sm overflow-auto min-h-[200px] mt-2"></div>
    </section>

    <!-- ── INGREDIENTS TAB ── -->
    <section id="vi" class="hidden px-3 pt-3 pb-24">
      <div class="flex items-center justify-between mb-3">
        <h2 class="text-lg font-semibold text-slate-800">🏷️ Ingredients</h2>
        <button onclick="openAddIngredient()" class="px-3 py-1.5 bg-slate-900 text-white rounded-lg text-sm">+ Add</button>
      </div>
      <!-- Search -->
      <input id="ingrSearchMain" placeholder="Search ingredient..."
        class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm mb-3 outline-none"
        oninput="filterIngredientsTab(this.value)">
      <!-- Category filter -->
      <div id="ingrCategoryFilter" class="flex gap-2 overflow-x-auto pb-2 mb-3" style="scrollbar-width:none;">
        <button onclick="filterIngrCategory('all',this)" class="px-3 py-1 rounded-full text-xs font-medium bg-slate-900 text-white whitespace-nowrap">All</button>
        <button onclick="filterIngrCategory('Dairy',this)" class="px-3 py-1 rounded-full text-xs font-medium bg-slate-100 text-slate-600 whitespace-nowrap">🧀 Dairy</button>
        <button onclick="filterIngrCategory('Produce',this)" class="px-3 py-1 rounded-full text-xs font-medium bg-slate-100 text-slate-600 whitespace-nowrap">🥦 Produce</button>
        <button onclick="filterIngrCategory('Protein',this)" class="px-3 py-1 rounded-full text-xs font-medium bg-slate-100 text-slate-600 whitespace-nowrap">🥩 Protein</button>
        <button onclick="filterIngrCategory('Seafood',this)" class="px-3 py-1 rounded-full text-xs font-medium bg-slate-100 text-slate-600 whitespace-nowrap">🐟 Seafood</button>
        <button onclick="filterIngrCategory('Dry Goods',this)" class="px-3 py-1 rounded-full text-xs font-medium bg-slate-100 text-slate-600 whitespace-nowrap">🌾 Dry Goods</button>
        <button onclick="filterIngrCategory('Other',this)" class="px-3 py-1 rounded-full text-xs font-medium bg-slate-100 text-slate-600 whitespace-nowrap">📦 Other</button>
      </div>
      <!-- List -->
      <div id="ingrTabList" class="space-y-2">
        <div class="text-sm text-slate-400 text-center py-8">Loading...</div>
      </div>
    </section>

  </main>

  <!-- Bottom Nav -->
  <nav class="fixed bottom-0 left-0 right-0 z-40 border-t" style="background:rgba(255,255,255,0.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-color:rgba(59,130,246,0.15);">
    <div class="max-w-md mx-auto h-[72px] flex items-end justify-around pb-3 px-2">
      <button data-t="h" class="tab flex flex-col items-center gap-1 w-16 tab-active">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="tab-icon" style="stroke:#059669"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span class="text-[10px] font-medium tab-label" style="color:#059669">Home</span>
      </button>
      <button data-t="m" class="tab flex flex-col items-center gap-1 w-16 text-slate-500">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="tab-icon"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/></svg>
        <span class="text-[10px] tab-label">Prep</span>
      </button>
      <button data-t="s" class="tab flex flex-col items-center gap-1 w-16 text-slate-500">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="tab-icon"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><path d="m9 14 2 2 4-4"/></svg>
        <span class="text-[10px] tab-label">Chiusura</span>
      </button>
      <button data-t="c" class="tab flex flex-col items-center gap-1 w-16 text-slate-500 relative">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="tab-icon"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        <span class="text-[10px] tab-label">Ricette</span>
