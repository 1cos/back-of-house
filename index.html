<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Back of House — v29</title>
<meta name="theme-color" content="#059669">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Back of House">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="manifest" href="./manifest.json">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body{font-family:Inter,system-ui,sans-serif}
  .tab-active{color:#059669} .tab-active svg{stroke:#059669}
  .scrollbar-hide::-webkit-scrollbar{display:none}
  @keyframes marquee{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}
  .animate-marquee{animation:marquee 25s linear infinite}
  .snap-y{scroll-snap-type:y mandatory} .snap-start{scroll-snap-align:start}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  .animate-pulse{animation:pulse 1.5s ease-in-out infinite}
  @keyframes flyOut{0%{transform:scale(1);opacity:1}50%{transform:scale(1.1) translateY(-10px);opacity:0.8}100%{transform:scale(0.5) translateY(-30px);opacity:0}}
  .fly-out{animation:flyOut 0.5s ease-out forwards}
  @keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
</style>
</head>

<body class="bg-[#f5f7fb]">

<!-- LOGIN -->
<div id="login" class="min-h-screen flex items-center justify-center p-4 bg-slate-900">
  <div class="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl">
    <h1 class="text-2xl font-bold text-center">Back of House</h1>
    <p class="text-center text-sm text-slate-500 mb-6">Prep • Check • Chat</p>
    <input id="name" placeholder="Nome" class="w-full mb-3 px-3 py-2.5 rounded-xl bg-slate-100">
    <input id="pass" type="password" placeholder="Password" class="w-full mb-3 px-3 py-2.5 rounded-xl bg-slate-100">
    <div class="grid grid-cols-3 gap-2 mb-4">
      <button type="button" data-lang="it" class="lang-btn py-2 rounded-xl bg-slate-900 text-white text-sm">🇮🇹 IT</button>
      <button type="button" data-lang="es" class="lang-btn py-2 rounded-xl bg-slate-100 text-sm">🇪🇸 ES</button>
      <button type="button" data-lang="en" class="lang-btn py-2 rounded-xl bg-slate-100 text-sm">🇬🇧 EN</button>
    </div>
    <button id="loginBtn" class="w-full bg-slate-900 text-white py-3 rounded-xl font-semibold">Entra</button>
    <p id="err" class="text-red-600 text-xs text-center mt-3 hidden"></p>
  </div>
</div>

<div id="app" class="hidden min-h-screen flex flex-col bg-[#f5f7fb]">
  <!-- Top bar -->
  <div class="sticky top-0 z-30 bg-white/90 backdrop-blur border-b">
    <div class="max-w-md mx-auto px-3 h-11 flex items-center justify-between">
      <div class="font-bold text-[15px] flex items-center gap-1.5"><span>🍳</span><span>Back of House</span></div>
      <div class="flex items-center gap-2 text-xs">
        <span id="who" class="font-medium"></span>
        <div id="online" class="flex -space-x-1"></div>
        <button id="alertBtn" class="hidden px-2 py-1 bg-red-600 text-white rounded-lg">🚨</button>
        <button id="userMgrBtn" onclick="openUserManager()" class="hidden px-2 py-1 bg-slate-100 rounded-lg">👥</button>
        <button onclick="openChangePassword()" class="px-2 py-1 bg-slate-100 rounded-lg">🔑</button>
        <button id="out" class="px-2 py-1 bg-slate-100 rounded-lg">Esci</button>
      </div>
    </div>
  </div>

  <!-- News ticker -->
  <div id="newsBar" class="hidden bg-amber-100 border-b border-amber-200">
    <div class="max-w-md mx-auto px-3 py-1.5 flex items-center gap-2">
      <span class="text-[10px] font-bold text-amber-800 uppercase">NEWS</span>
      <div class="flex-1 overflow-hidden"><div id="newsScroll" class="whitespace-nowrap text-[13px] text-slate-700 animate-marquee"></div></div>
      <button id="newsManage" class="hidden text-[10px] px-2 py-0.5 bg-amber-600 text-white rounded">Gest</button>
    </div>
  </div>

  <!-- Right rail -->
  <div class="fixed right-3 top-[38%] z-40 flex flex-col gap-3">
    <button onclick="showChat()" class="w-12 h-12 bg-white rounded-full shadow-lg flex items-center justify-center relative active:scale-95 transition">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span id="badge" class="hidden absolute -top-1 -right-1 bg-red-500 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full font-bold"></span>
    </button>
    <button onclick="document.getElementById('alertBtn').click()" class="w-12 h-12 bg-white rounded-full shadow-lg flex items-center justify-center active:scale-95 transition">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    </button>
    <button onclick="alert('Inventario — in arrivo')" class="w-12 h-12 bg-white rounded-full shadow-lg flex items-center justify-center active:scale-95 transition">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
    </button>
    <button onclick="document.querySelector('[data-t=r]').click()" class="w-12 h-12 bg-white rounded-full shadow-lg flex items-center justify-center active:scale-95 transition">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>
    </button>
  </div>

  <main class="flex-1 max-w-md w-full mx-auto pb-24">

    <!-- HOME (nuova) -->
    <section id="vh" class="px-3 pt-3 space-y-4">
      <!-- Briefing AI -->
      <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
        <div class="flex items-center justify-between px-4 pt-3 pb-2 border-b border-slate-100">
          <div class="flex items-center gap-2">
            <span class="text-base">🤖</span>
            <span class="font-semibold text-sm">Briefing AI</span>
          </div>
          <button id="briefingRefreshBtn" onclick="refreshBriefing()" class="text-[11px] text-emerald-600 font-medium">Aggiorna</button>
        </div>
        <div id="briefingContent" class="px-4 py-3 space-y-2">
          <div class="animate-pulse h-4 bg-slate-100 rounded w-3/4"></div>
          <div class="animate-pulse h-4 bg-slate-100 rounded w-full"></div>
          <div class="animate-pulse h-4 bg-slate-100 rounded w-2/3"></div>
        </div>
      </div>

      <!-- Checklist chiusura per stazione -->
      <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
        <div class="flex items-center justify-between px-4 pt-3 pb-2 border-b border-slate-100">
          <span id="homeChecklistLabel" class="font-semibold text-sm">Checklist chiusura</span>
          <button id="homeOpenBtn" onclick="document.querySelector('[data-t=s]').click()" class="text-[11px] text-slate-500">Apri →</button>
        </div>
        <div id="homeStations" class="px-4 py-3 flex flex-wrap gap-2"></div>
      </div>

      <!-- Accesso rapido -->
      <div class="grid grid-cols-2 gap-2.5">
        <button onclick="document.querySelector('[data-t=m]').click()" class="bg-slate-900 text-white p-4 rounded-2xl text-left active:scale-95 transition">
          <div class="text-2xl mb-1">🧑‍🍳</div>
          <div class="font-semibold text-sm" id="homePrep">Prep</div>
          <div class="text-xs text-slate-400 mt-0.5" id="homePrepSub">Preparazioni mattina</div>
        </button>
        <button onclick="document.querySelector('[data-t=s]').click()" class="bg-white border border-slate-200 p-4 rounded-2xl text-left active:scale-95 transition shadow-sm">
          <div class="text-2xl mb-1">✅</div>
          <div class="font-semibold text-sm" id="homeClose">Chiusura</div>
          <div class="text-xs text-slate-500 mt-0.5" id="homeCloseSub">Checklist sera</div>
        </button>
        <button onclick="document.querySelector('[data-t=c]').click()" class="bg-white border border-slate-200 p-4 rounded-2xl text-left active:scale-95 transition shadow-sm">
          <div class="text-2xl mb-1">📖</div>
          <div class="font-semibold text-sm" id="homeRec">Ricette</div>
          <div class="text-xs text-slate-500 mt-0.5" id="homeRecSub">Tutte le preparazioni</div>
        </button>
        <button onclick="showChat()" class="bg-white border border-slate-200 p-4 rounded-2xl text-left active:scale-95 transition shadow-sm">
          <div class="text-2xl mb-1">💬</div>
          <div class="font-semibold text-sm" id="homeChat">Chat</div>
          <div class="text-xs text-slate-500 mt-0.5" id="homeChatSub">Brigata</div>
        </button>
      </div>
    </section>

    <!-- PREP -->
    <section id="vm" class="hidden px-3 pt-2">
      <!-- Barra progresso urgenti -->
      <div id="urgentProgress" class="hidden mb-2 bg-white rounded-2xl border border-slate-200 p-3 shadow-sm">
        <div class="flex items-center justify-between mb-1.5">
          <span class="text-xs font-semibold text-red-600">🔴 <span id="urgentCount">0</span> urgenti</span>
          <span id="urgentTime" class="text-xs text-slate-400"></span>
        </div>
        <div class="h-2 bg-slate-100 rounded-full overflow-hidden">
          <div id="urgentBar" class="h-full bg-red-500 rounded-full transition-all duration-500" style="width:0%"></div>
        </div>
        <p id="urgentDone" class="hidden text-xs text-emerald-600 font-semibold text-center mt-1">✅ Tutte le urgenti completate!</p>
      </div>
      <div class="flex items-center gap-2 mb-2">
        <div id="stations" class="flex gap-2 overflow-x-auto scrollbar-hide flex-1"></div>
        <button id="toggleView" class="px-2.5 py-1.5 bg-white border border-slate-200 rounded-xl text-[11px] font-semibold shadow-sm">Feed</button>
        <button id="addPrepBtn" onclick="adminAdd()" class="hidden px-2.5 py-1.5 bg-emerald-600 text-white rounded-xl text-[11px] font-semibold shadow-sm">+ Prep</button>
      </div>
      <div id="grid" class="grid grid-cols-2 gap-2.5"></div>
      <div id="feed" class="hidden -mx-3 h-[calc(100vh-170px)] overflow-y-auto snap-y snap-mandatory bg-[#f5f7fb]"></div>
    </section>

    <!-- CHIUSURA -->
    <section id="vs" class="hidden px-3 pt-2">
      <div id="stations2" class="flex gap-2 overflow-x-auto scrollbar-hide pb-2"></div>
      <div id="checks" class="space-y-2 mt-2"></div>
      <div class="mt-4 pb-4">
        <button id="closeTurnBtn" onclick="closeTurn()" class="w-full py-3.5 bg-slate-900 text-white rounded-2xl font-semibold text-sm">Chiudi Turno</button>
      </div>
    </section>

    <!-- CHAT -->
    <section id="vc" class="hidden h-[calc(100vh-140px)] flex flex-col">
      <div id="msgs" class="flex-1 overflow-y-auto p-3 space-y-2 bg-slate-50"></div>
      <form id="f" class="p-3 bg-white border-t flex gap-2">
        <input id="txt" class="flex-1 px-3 py-2 bg-slate-100 rounded-xl" placeholder="Scrivi...">
        <button class="px-4 bg-slate-900 text-white rounded-xl">Invia</button>
      </form>
    </section>

    <!-- RICETTE -->
    <section id="vp" class="hidden px-3 pt-3">
      <div class="flex items-center justify-between mb-2">
        <h2 class="text-lg font-semibold">Ricette</h2>
        <div id="recipeAdminBtns" class="flex gap-2">
          <button onclick="openRecipeManager()" class="px-3 py-1.5 bg-emerald-600 text-white rounded-lg text-xs">Collega</button>
          <button onclick="openRecipeEditor()" class="px-3 py-1.5 bg-slate-900 text-white rounded-lg text-xs">+ Nuova</button>
        </div>
      </div>
      <div class="mb-2">
        <input id="recipeSearch" placeholder="Cerca ricetta..." class="w-full px-3 py-2 rounded-xl bg-white border text-sm" oninput="renderRecipes()">
      </div>
      <div id="recipeCats" class="flex gap-2 overflow-x-auto scrollbar-hide pb-2"></div>
      <div id="recipeGrid" class="grid grid-cols-2 gap-2.5 mt-2 pb-4"></div>
    </section>

    <!-- REPORT -->
    <section id="vr" class="hidden px-3 pt-3">
      <div class="flex items-center justify-between mb-3">
        <h2 id="reportTitle" class="text-lg font-semibold">Report</h2>
        <div class="flex gap-2 flex-wrap">
          <button id="btnToday" onclick="loadReport('today')" class="px-3 py-1.5 bg-slate-900 text-white rounded-lg text-sm">Oggi</button>
          <button id="btnWeek" onclick="loadReport('week')" class="px-3 py-1.5 bg-slate-200 rounded-lg text-sm">Settimana</button>
          <button id="btnPresence" onclick="showPresenceTab()" class="hidden px-3 py-1.5 bg-slate-200 rounded-lg text-sm">Presenze</button>
          <button id="btnAlertsLog" onclick="showAlertsLogTab()" class="hidden px-3 py-1.5 bg-slate-200 rounded-lg text-sm">Avvisi</button>
          <button id="btnPDF" onclick="exportPDF()" class="px-3 py-1.5 bg-green-600 text-white rounded-lg text-sm">PDF</button>
        </div>
      </div>
      <div id="reportOut" class="bg-white rounded-xl border p-3 text-sm overflow-auto min-h-[200px]">Seleziona Oggi o Settimana</div>
      <div id="presenceLogOut" class="hidden bg-white rounded-xl border p-3 text-sm overflow-auto min-h-[200px] mt-2"></div>
      <div id="alertsLogOut" class="hidden bg-white rounded-xl border p-3 text-sm overflow-auto min-h-[200px] mt-2"></div>
    </section>

  </main>

  <!-- Bottom Nav -->
  <nav class="fixed bottom-0 left-0 right-0 z-40 bg-white/95 backdrop-blur border-t border-slate-200">
    <div class="max-w-md mx-auto h-[72px] flex items-end justify-around pb-3 px-2">
      <button data-t="h" class="tab flex flex-col items-center gap-1 w-16 tab-active">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="tab-icon" style="stroke:#059669"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span class="text-[10px] font-medium tab-label" style="color:#059669">Home</span>
      </button>
      <button data-t="m" class="tab flex flex-col items-center gap-1 w-16 text-slate-500">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="tab-icon"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/></svg>
        <span class="text-[10px] tab-label">Prep</span>
      </button>
      <button data-t="s" class="tab flex flex-col items-center gap-1 w-16 text-slate-500">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="tab-icon"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><path d="m9 14 2 2 4-4"/></svg>
        <span class="text-[10px] tab-label">Chiusura</span>
      </button>
      <button data-t="c" class="tab flex flex-col items-center gap-1 w-16 text-slate-500 relative">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="tab-icon"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        <span class="text-[10px] tab-label">Ricette</span>
      </button>
      <button data-t="r" class="tab flex flex-col items-center gap-1 w-16 text-slate-500">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="tab-icon"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>
        <span class="text-[10px] tab-label">Report</span>
      </button>
    </div>
  </nav>
</div>


<script src="js/utils.js"></script>
<script src="js/news.js"></script>
<script src="js/app.js"></script>
<script src="js/briefing.js"></script>
<script src="js/init.js"></script>
<script src="js/admin.js"></script>
<script src="js/prep.js"></script>
<script src="js/closing.js"></script>
<script src="js/recipes.js"></script>
<script src="js/chat.js"></script>
<script src="js/presence.js"></script>
<script src="js/auth.js"></script>
<script src="js/push.js"></script>
<script src="js/souschef.js"></script>
<script>if('serviceWorker'in navigator){navigator.serviceWorker.register('./sw.js')}</script>
</html>
