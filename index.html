<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Back of House</title>
<meta name="theme-color" content="#059669">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Back of House">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="manifest" href="./manifest.json">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="js/vendor-documents-review.js"></script>
<script src="js/warnings-banner.js"></script>
<script src="js/operation-notes.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body{font-family:Inter,system-ui,sans-serif}
  .glass{background:rgba(255,255,255,0.6);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:0.5px solid rgba(59,130,246,0.18);border-radius:18px;}
  .glass-card{background:rgba(255,255,255,0.55);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1.5px solid rgba(59,130,246,0.15);border-radius:16px;}
  .tab-active{color:#059669} .tab-active svg{stroke:#059669}
  .scrollbar-hide::-webkit-scrollbar{display:none}
  @keyframes marquee{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}
  .animate-marquee{animation:marquee 25s linear infinite}
  .snap-y{scroll-snap-type:y mandatory} .snap-start{scroll-snap-align:start}
  @keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  .animate-pulse{animation:pulse 1.5s ease-in-out infinite}
  @keyframes flyOut{0%{transform:scale(1);opacity:1}50%{transform:scale(1.1) translateY(-10px);opacity:0.8}100%{transform:scale(0.5) translateY(-30px);opacity:0}}
  .fly-out{animation:flyOut 0.5s ease-out forwards}
  @keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
</style>
</style>
  <style>
    /* ── TYPOGRAPHY & COLOR OVERRIDES ── */
    /* Top bar */
    #app .text-sm { font-size: 14px !important; }
    /* Back of House title */
    .app-title { font-size: 17px !important; font-weight: 600 !important; }
    /* Username nel top bar */
    #who { font-size: 14px !important; font-weight: 500 !important; }
    /* News bar */
    #newsBar { font-size: 13px !important; }
    #newsScroll { font-size: 13px !important; }
    /* Widget titles (SERVICE UPDATES, YOUR STATION, etc) */
    .text-\[11px\] { font-size: 12px !important; }
    .text-\[10px\] { font-size: 11px !important; }
    /* Tono celeste più scuro — sostituzione variabili colore */
    :root {
      --color-blue-light: #bfdbfe;   /* era #93c5fd */
      --color-blue-mid:   #3b82f6;   /* invariato */
      --color-blue-dark:  #1d4ed8;   /* più scuro */
      --color-navy:       #1e3a5f;   /* invariato */
    }
    /* Subtitles e labels celesti più scuri */
    [style*="color:#93c5fd"] { color: #60a5fa !important; }
    [style*="color: #93c5fd"] { color: #60a5fa !important; }
    /* Tab labels */
    .tab-label { font-size: 11px !important; }
    /* Avatar utenti online nel top bar — più grandi */
    #online .online-dot,
    #online img,
    #online div {
      width: 36px !important;
      height: 36px !important;
      min-width: 36px !important;
      font-size: 13px !important;
      border: 2px solid white !important;
    }
    /* Section headers (UPCOMING DEMAND, SERVICE UPDATES...) */
    .tracking-wider { letter-spacing: 0.08em; }
    /* iOS Safari scroll lock */
  body.sheet-open {
    overflow: hidden;
    position: fixed;
    width: 100%;
    top: 0;
  }
</style>
</head>

<body style="background:linear-gradient(160deg,#eff6ff 0%,#dbeafe 60%,#e0f2fe 100%);min-height:100vh;">

<!-- LOGIN — PIN KEYPAD -->
<div id="login" class="min-h-screen flex items-center justify-center p-4" style="background:linear-gradient(160deg,#1e3a5f 0%,#1e40af 100%);">
  <div style="width:100%;max-width:340px;">
    <div style="text-align:center;margin-bottom:32px;">
      <div style="font-size:22px;font-weight:500;color:white;margin-bottom:4px;">Back of House</div>
      <div style="font-size:13px;color:rgba(255,255,255,0.5);">Zenos on the Square</div>
    </div>

    <!-- PIN dots -->
    <div id="pinDots" style="display:flex;justify-content:center;gap:14px;margin-bottom:32px;">
      <div class="pin-dot" style="width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);background:transparent;"></div>
      <div class="pin-dot" style="width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);background:transparent;"></div>
      <div class="pin-dot" style="width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);background:transparent;"></div>
      <div class="pin-dot" style="width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);background:transparent;"></div>
    </div>

    <!-- Keypad -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;max-width:280px;margin:0 auto;">
      <button class="pin-key" onclick="pinPress('1')">1</button>
      <button class="pin-key" onclick="pinPress('2')">2</button>
      <button class="pin-key" onclick="pinPress('3')">3</button>
      <button class="pin-key" onclick="pinPress('4')">4</button>
      <button class="pin-key" onclick="pinPress('5')">5</button>
      <button class="pin-key" onclick="pinPress('6')">6</button>
      <button class="pin-key" onclick="pinPress('7')">7</button>
      <button class="pin-key" onclick="pinPress('8')">8</button>
      <button class="pin-key" onclick="pinPress('9')">9</button>
      <div></div>
      <button class="pin-key" onclick="pinPress('0')">0</button>
      <button class="pin-key pin-del" onclick="pinDel()">⌫</button>
    </div>

    <p id="err" class="text-red-400 text-xs text-center mt-5 hidden"></p>
  </div>
</div>

<style>
.pin-key{height:70px;border-radius:50%;background:rgba(255,255,255,0.12);border:0.5px solid rgba(255,255,255,0.2);color:white;font-size:24px;font-weight:400;cursor:pointer;transition:background .15s;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;-webkit-user-select:none;}
.pin-key:active{background:rgba(255,255,255,0.28);}
.pin-del{font-size:20px;}
</style>
<script>
function pinPress(d){if(typeof window._pinPress==='function')window._pinPress(d);}
function pinDel(){if(typeof window._pinDel==='function')window._pinDel();}
</script>

<div id="app" class="hidden min-h-screen flex flex-col" style="background:transparent;">
  <!-- Top bar -->
  <div class="sticky top-0 z-30" style="background:rgba(255,255,255,0.92);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:0.5px solid rgba(59,130,246,0.12);box-shadow:0 2px 8px rgba(30,58,95,0.06);">
    <div class="max-w-md mx-auto px-4 h-16 flex items-center gap-2">

      <!-- SINISTRA: avatar + buongiorno + nome -->
      <div onclick="openProfile()" style="display:flex;align-items:center;gap:10px;cursor:pointer;flex-shrink:0;-webkit-tap-highlight-color:transparent;">
        <div id="topbarAvatar" style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#1e3a5f,#2563eb);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:white;overflow:hidden;flex-shrink:0;box-shadow:0 3px 8px rgba(30,58,95,0.3);"></div>
        <div style="line-height:1.2;">
          <div id="topbarGreeting" style="font-size:11px;color:#60a5fa;line-height:1;"></div>
          <div style="display:flex;align-items:baseline;gap:5px;">
            <div id="who" style="font-size:16px;font-weight:600;color:#1e3a5f;line-height:1.3;"></div>
            <div id="appVersion" style="font-size:12px;color:#94a3b8;font-weight:600;"></div>
          </div>
        </div>
      </div>

      <!-- CENTRO: utenti online -->
      <div id="online" class="flex items-center" style="flex:1;justify-content:center;gap:4px;"></div>

      <!-- DESTRA: campanella → solo admin; bottoni legacy nascosti -->
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
        <button id="alertBtn" class="hidden" style="width:36px;height:36px;border-radius:50%;background:#fee2e2;border:none;font-size:16px;cursor:pointer;">🚨</button>
        <button id="userMgrBtn" onclick="openUserManager()" style="display:none;"></button>
        <button id="pwdBtn" onclick="openChangePIN()" style="display:none;"></button>
        <button id="out" onclick="user=null;location.reload()" style="display:none;"></button>
        <button id="bellBtn" onclick="isAdmin()?showNewsModal():null" style="width:38px;height:38px;border-radius:50%;background:white;border:0.5px solid rgba(59,130,246,0.2);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(30,58,95,0.1);position:relative;-webkit-tap-highlight-color:transparent;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1e3a5f" stroke-width="1.8" stroke-linecap="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>
          <span id="bellDot" style="display:none;position:absolute;top:7px;right:7px;width:8px;height:8px;background:#ef4444;border-radius:50%;border:1.5px solid white;"></span>
        </button>
      </div>

    </div>

    <!-- News pill blu scorrevole — visibile solo se ci sono news -->
    <div id="newsBar" class="hidden" style="padding:0 14px 8px;">
      <div style="background:rgba(59,130,246,0.07);border:0.5px solid rgba(59,130,246,0.18);border-radius:12px;padding:6px 13px;display:flex;align-items:center;gap:9px;overflow:hidden;box-shadow:0 1px 4px rgba(59,130,246,0.08);">
        <span style="font-size:10px;font-weight:700;color:#3b82f6;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;flex-shrink:0;">News</span>
        <span style="width:1px;height:13px;background:rgba(59,130,246,0.2);flex-shrink:0;"></span>
        <div style="flex:1;overflow:hidden;">
          <div id="newsScroll" class="whitespace-nowrap animate-marquee" style="font-size:12px;color:#1e3a5f;"></div>
        </div>
        <button id="newsManage" class="hidden" style="font-size:10px;padding:2px 8px;background:#3b82f6;color:white;border:none;border-radius:6px;cursor:pointer;flex-shrink:0;">Gest</button>
      </div>
    </div>

  </div>

  <!-- Right rail -->
  <!-- Menu laterale rimosso — tutto nella bottom bar -->
  <!-- Badge rimosso dalla posizione fixed — ora è solo nella bottom bar -->

  <main class="flex-1 max-w-md w-full mx-auto pb-24" style="background:transparent;">

    <!-- HOME -->
    <section id="vh" class="px-3 pt-3 pb-4 space-y-3">

      <!-- ── CLOSING CHECKLIST (sale in cima dopo le 20:00) — tutti ── -->
      <!-- Nascosto di default, JS lo mostra dopo le 20:00 -->
      <div id="homeClosingWidget" style="display:none;background:white;border:0.5px solid rgba(59,130,246,0.1);border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(30,58,95,0.07),0 8px 24px rgba(30,58,95,0.05);">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;border-bottom:0.5px solid rgba(59,130,246,0.08);">
          <span style="font-size:11px;font-weight:600;color:#60a5fa;letter-spacing:.06em;text-transform:uppercase;">Closing Checklist</span>
          <button onclick="document.querySelector('[data-t=s]').click()" style="font-size:12px;color:#3B82F6;background:none;border:none;cursor:pointer;">Open →</button>
        </div>
        <div id="homeClosingStations" style="padding:9px 14px;display:flex;flex-wrap:wrap;gap:6px;"></div>
        <!-- Campo commento serale — appare solo dopo le 20:00 -->
        <div id="homeEveningNote" style="padding:0 14px 14px;">
          <textarea id="homeEveningNoteText" rows="2" placeholder="Anything to pass on for tomorrow?"
            style="width:100%;padding:8px 12px;border:0.5px solid rgba(59,130,246,0.2);border-radius:10px;font-size:13px;resize:none;box-sizing:border-box;outline:none;font-family:inherit;color:#1e3a5f;background:rgba(59,130,246,0.03);"></textarea>
          <button onclick="saveEveningNote()" style="margin-top:6px;width:100%;height:36px;border-radius:10px;background:#1e3a5f;color:white;font-size:13px;font-weight:500;border:none;cursor:pointer;">Save note</button>
        </div>
      </div>

      <!-- WARNINGS BANNER — populated by warnings-banner.js — solo admin -->
      <div id="warningsBanner" style="display:none;"></div>

      <!-- Invoice quick actions — solo admin -->
      <div id="invoiceSection" style="display:none;">
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
          <button onclick="openInvoiceImport()" style="background:white;border:0.5px solid rgba(59,130,246,0.12);border-radius:16px;padding:14px 12px;text-align:left;cursor:pointer;box-shadow:0 2px 8px rgba(30,58,95,0.08),0 6px 16px rgba(30,58,95,0.05);-webkit-tap-highlight-color:transparent;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="1.8" stroke-linecap="round" style="margin-bottom:7px;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
            <div style="font-size:12px;font-weight:600;color:#1e3a5f;line-height:1.3;">Import Invoice</div>
            <div style="font-size:10px;color:#60a5fa;margin-top:3px;">Photo / PDF</div>
          </button>
          <button onclick="openVendorDocumentsReview()" style="background:white;border:0.5px solid rgba(59,130,246,0.12);border-radius:16px;padding:14px 12px;text-align:left;cursor:pointer;box-shadow:0 2px 8px rgba(30,58,95,0.08),0 6px 16px rgba(30,58,95,0.05);-webkit-tap-highlight-color:transparent;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="1.8" stroke-linecap="round" style="margin-bottom:7px;"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/><path d="m9 14 2 2 4-4"/></svg>
            <div style="font-size:12px;font-weight:600;color:#1e3a5f;line-height:1.3;">Vendor Review</div>
            <div id="vdrPendingBadge" style="font-size:10px;color:#60a5fa;margin-top:3px;">Pending</div>
          </button>
          <button onclick="openPurchaseHistory()" style="background:white;border:0.5px solid rgba(59,130,246,0.12);border-radius:16px;padding:14px 12px;text-align:left;cursor:pointer;box-shadow:0 2px 8px rgba(30,58,95,0.08),0 6px 16px rgba(30,58,95,0.05);-webkit-tap-highlight-color:transparent;">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="1.8" stroke-linecap="round" style="margin-bottom:7px;"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            <div style="font-size:12px;font-weight:600;color:#1e3a5f;line-height:1.3;">Purchase History</div>
            <div style="font-size:10px;color:#60a5fa;margin-top:3px;">All invoices</div>
          </button>
        </div>
      </div>

      <!-- Briefing AI — solo admin -->
      <div id="homeBriefingSection" style="display:none;background:white;border:0.5px solid rgba(59,130,246,0.1);border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(30,58,95,0.07),0 8px 24px rgba(30,58,95,0.05);">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;border-bottom:0.5px solid rgba(59,130,246,0.08);">
          <span style="font-size:11px;font-weight:600;color:#60a5fa;letter-spacing:.06em;text-transform:uppercase;">Briefing AI</span>
          <button id="briefingRefreshBtn" onclick="refreshBriefing()" style="font-size:12px;color:#3B82F6;background:none;border:none;cursor:pointer;">Refresh</button>
        </div>
        <div id="briefingContent" style="padding:10px 14px;">
          <div class="animate-pulse h-4 bg-slate-100 rounded w-3/4 mb-2"></div>
          <div class="animate-pulse h-4 bg-slate-100 rounded w-full mb-2"></div>
          <div class="animate-pulse h-4 bg-slate-100 rounded w-2/3"></div>
        </div>
      </div>

      <!-- Yesterday's Highlights / Weekly Highlights — admin: tecnico, staff: motivazionale -->
      <!-- Il titolo viene aggiornato da JS in base al giorno della settimana -->
      <div id="homeHighlightsWidget" style="background:white;border:0.5px solid rgba(59,130,246,0.1);border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(30,58,95,0.07),0 8px 24px rgba(30,58,95,0.05);">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;border-bottom:0.5px solid rgba(59,130,246,0.08);">
          <span id="homeHighlightsTitle" style="font-size:11px;font-weight:600;color:#60a5fa;letter-spacing:.06em;text-transform:uppercase;">Yesterday's Highlights</span>
          <button onclick="openServiceUpdates()" style="font-size:12px;color:#3B82F6;background:none;border:none;cursor:pointer;">View all</button>
        </div>
        <div id="serviceUpdatesList" style="padding:9px 14px;"></div>
      </div>

      <!-- Upcoming Demand — tutti -->
      <div style="background:white;border:0.5px solid rgba(59,130,246,0.1);border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(30,58,95,0.07),0 8px 24px rgba(30,58,95,0.05);">
        <div style="padding:10px 14px 8px;border-bottom:0.5px solid rgba(59,130,246,0.08);">
          <span style="font-size:11px;font-weight:600;color:#60a5fa;letter-spacing:.06em;text-transform:uppercase;">Upcoming Demand</span>
        </div>
        <div id="upcomingDemand" style="padding:9px 14px;">
          <div style="font-size:13px;color:#94a3b8;padding:4px 0;">No upcoming events</div>
        </div>
      </div>

      <!-- Stations — admin: tutte le stazioni; staff: la propria + altre in pill -->
      <div id="homeStationsWidget" style="background:white;border:0.5px solid rgba(59,130,246,0.1);border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(30,58,95,0.07),0 8px 24px rgba(30,58,95,0.05);">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;border-bottom:0.5px solid rgba(59,130,246,0.08);">
          <span id="homeStationsTitle" style="font-size:11px;font-weight:600;color:#60a5fa;letter-spacing:.06em;text-transform:uppercase;">Stations</span>
          <button id="homeStationsGoBtn" onclick="document.querySelector('[data-t=m]').click()" style="font-size:12px;color:#3B82F6;background:none;border:none;cursor:pointer;">Go to prep →</button>
        </div>
        <!-- Admin: pill tutte le stazioni -->
        <div id="homeStations" style="padding:9px 14px;display:flex;flex-wrap:wrap;gap:6px;"></div>
        <!-- Staff: top 3 item propria stazione -->
        <div id="homeStationItems" style="padding:9px 14px;padding-bottom:14px;display:none;"></div>
        <!-- Staff: altre stazioni con item da fare — label + pill -->
        <div id="homeOtherStationsLabel" style="display:none;padding:8px 14px 4px;border-top:0.5px solid rgba(59,130,246,0.08);">
          <span style="font-size:10px;font-weight:700;color:#60a5fa;letter-spacing:.06em;text-transform:uppercase;">Other Stations</span>
        </div>
        <div id="homeOtherStations" style="padding:4px 14px 14px;display:none;flex-wrap:wrap;gap:6px;"></div>
      </div>

      <!-- Closing Checklist nella posizione originale — solo admin, solo prima delle 20:00 -->
      <div id="homeChecklistSection" style="display:none;background:white;border:0.5px solid rgba(59,130,246,0.1);border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(30,58,95,0.07),0 8px 24px rgba(30,58,95,0.05);">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;border-bottom:0.5px solid rgba(59,130,246,0.08);">
          <span id="homeChecklistLabel" style="font-size:11px;font-weight:600;color:#60a5fa;letter-spacing:.06em;text-transform:uppercase;">Closing Checklist</span>
          <button id="homeOpenBtn" onclick="document.querySelector('[data-t=s]').click()" style="font-size:12px;color:#3B82F6;background:none;border:none;cursor:pointer;">Open →</button>
        </div>
        <div id="homeChecklistStations" style="padding:9px 14px;display:flex;flex-wrap:wrap;gap:6px;"></div>
      </div>

    </section>

    <!-- PREP -->
    <section id="vm" class="hidden px-3 pt-2">
      <!-- urgentProgress rimosso -->
      <div class="flex items-center gap-2 mb-2">
        <div id="stations" class="flex gap-2 overflow-x-auto scrollbar-hide flex-1"></div>
        <button id="toggleView" class="px-2.5 py-1.5 bg-white border border-slate-200 rounded-xl text-[11px] font-semibold shadow-sm">Feed</button>
        <button id="addPrepBtn" onclick="adminAdd()" class="hidden px-2.5 py-1.5 bg-emerald-600 text-white rounded-xl text-[11px] font-semibold shadow-sm">+ Prep</button>
      </div>
      <div id="grid" class="grid grid-cols-1 gap-2"></div>
      <div id="feed" class="hidden -mx-3 h-[calc(100vh-170px)] overflow-y-auto snap-y snap-mandatory bg-[#f5f7fb]"></div>
    </section>

    <!-- CHIUSURA -->

<script>
// Greeting dinamico basato sull'ora (CDT)
(function(){
  var el = document.getElementById('topbarGreeting');
  if(!el) return;
  var h = new Date().toLocaleString('en-US',{timeZone:'America/Chicago',hour:'numeric',hour12:false});
  h = parseInt(h);
  if(h>=5 && h<12) el.textContent='Good morning,';
  else if(h>=12 && h<17) el.textContent='Good afternoon,';
  else if(h>=17 && h<21) el.textContent='Good evening,';
  else el.textContent='Good night,';
})();
</script>

<script>if('serviceWorker'in navigator){navigator.serviceWorker.register('./sw.js')}</script>
<script>
// App version — single source of truth: CACHE_NAME in sw.js (boh-vNN).
// Bumped on every deploy; label and title update automatically.
fetch('sw.js?nocache=' + Date.now())
  .then(r => r.text())
  .then(t => {
    const m = t.match(/boh-v(\d+)/);
    if (!m) return;
    const v = 'v' + m[1];
    const el = document.getElementById('appVersion');
    if (el) el.textContent = v;
    document.title = 'Back of House — ' + v;
  })
  .catch(() => {});
</script>
