async function loadBriefing(){
  const el=document.getElementById('briefingContent');
  el.innerHTML=`<div class="animate-pulse h-4 bg-slate-100 rounded w-3/4"></div><div class="animate-pulse h-4 bg-slate-100 rounded w-full mt-2"></div><div class="animate-pulse h-4 bg-slate-100 rounded w-2/3 mt-2"></div>`;
  try{
    const today=new Date().toISOString().slice(0,10);
    let{data:briefing}=await supa.from('briefing').select('*').eq('date',today).maybeSingle();
    if(!briefing){
      // genera al momento
      const res=await fetch(`${SUPABASE_URL}/functions/v1/generate-briefing`,{
        method:'POST',
        headers:{'Authorization':`Bearer ${SUPABASE_ANON_KEY}`}
      });
      const json=await res.json();
      if(json.points) briefing={points:json.points};
    }
    if(!briefing||!briefing.points||!briefing.points.length){
      el.innerHTML=`<p class="text-sm text-slate-400">${tr('briefingEmpty')}</p>`;
      return;
    }
    const icons=['🔴','🟡','🔵'];
    el.innerHTML=briefing.points.map((p,i)=>`
      <div class="flex gap-2 items-start py-1">
        <span class="text-sm mt-0.5 flex-shrink-0">${icons[i]||'•'}</span>
        <p class="text-sm text-slate-700 leading-snug">${p}</p>
      </div>`).join('');
  }catch(e){
    el.innerHTML=`<p class="text-sm text-red-500">${tr('briefingError')}</p>`;
  }
}

async function loadNews(){
  const{data}=await supa.from('alerts').select('*').eq('is_active',true).order('created_at',{ascending:false});
  currentNews=data||[];
  const bar=document.getElementById('newsBar');
  if(!currentNews.length){bar.classList.add('hidden');return}
  bar.classList.remove('hidden');
  const base=currentNews.map(n=>{
    const t=new Date(n.created_at).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
    return{txt:n.message,suf:` • ${n.created_by||'Crew'} ${t}`};
  });
  let out;
  if(!user||user.lang==='it'){
    out=base.map(b=>b.txt+b.suf).join(' ✦ ');
  }else{
    const trs=await Promise.all(base.map(b=>
      fetch(`${SUPABASE_URL}/functions/v1/ai-translate`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${SUPABASE_ANON_KEY}`},body:JSON.stringify({text:b.txt,targetLang:user.lang})})
      .then(r=>r.json()).then(j=>j.translated||b.txt).catch(()=>b.txt)
    ));
    out=trs.map((t,i)=>t+base[i].suf).join(' ✦ ');
  }
  document.getElementById('newsScroll').textContent=out;
}

async function loadItemAlerts(){
  try{
    const{data}=await supa.from('v_item_alerts').select('*');
    itemAlerts={};
    (data||[]).forEach(r=>itemAlerts[r.name]=r);
  }catch(e){console.warn('alerts non caricate',e)}
}

function getAlertLevel(itemName){
  const a=itemAlerts[itemName];
  if(!a) return null;
  const today=new Date().toISOString().slice(0,10);
  const madeToday = a.last_made_at && a.last_made_at.slice(0,10)===today;
  if(!madeToday) return null;
  // calcola confidenza
  const qty = a.last_made_qty||0;
  const avgQty = a.average_qty||qty;
  const duration = a.expected_duration_days||1;
  const missingWeek = a.missing_count_week||0;
  // se prodotto oggi con quantità normale e durata attesa > 1 giorno → alta confidenza che ci sia
  if(qty >= avgQty*0.8 && duration > 1) return {level:'high', a};
  if(qty >= avgQty*0.5) return {level:'medium', a};
  return {level:'low', a};
}

async function checkBeforeMissing(id, itemName){
  const alert = getAlertLevel(itemName);
  if(!alert) return true; // nessun avviso, procedi
  const a = alert.a;
  const madeAt = new Date(a.last_made_at).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
  const madeQty = a.last_made_qty ? `${a.last_made_qty} ${a.last_made_by?'da '+a.last_made_by:''}` : '';
  const missingNote = a.missing_count_week>1 ? `\n⚠️ Segnalato mancante ${a.missing_count_week} volte questa settimana.` : '';
  
  const colors = {high:'🟢', medium:'🟡', low:'🔴'};
  const confidenceText = {high:'Alta confidenza che ci sia', medium:'Potrebbe essere finito', low:'Probabile che sia finito'};
  
  return new Promise(resolve=>{
    const popup=document.createElement('div');
    popup.className='fixed inset-0 z-[60] bg-black/60 backdrop-blur-sm flex items-center justify-center p-4';
    popup.innerHTML=`
      <div class="bg-white w-full max-w-sm rounded-3xl p-5 shadow-2xl" style="animation:slideUp .2s ease">
        <div class="text-center mb-4">
          <div class="text-4xl mb-2">🤔</div>

        </div>
        <div class="bg-slate-50 rounded-2xl p-3 mb-4 space-y-2">
          <div class="flex items-center gap-2 text-sm">
            <span>🧑‍🍳</span>
            <span><b>${a.last_made_by||'Qualcuno'}</b> l'ha fatto stamani alle <b>${madeAt}</b></span>
          </div>
          ${madeQty?`<div class="flex items-center gap-2 text-sm"><span>⚖️</span><span>Quantità: <b>${madeQty}</b></span></div>`:''}
          ${a.missing_count_week>1?`<div class="flex items-center gap-2 text-sm text-amber-700"><span>⚠️</span><span>Segnalato mancante <b>${a.missing_count_week}x</b> questa settimana</span></div>`:''}
          <div class="flex items-center gap-2 text-xs text-slate-500 pt-1 border-t">
            <span>${colors[alert.level]}</span>
            <span>${confidenceText[alert.level]}</span>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-2">
          <button id="alertCancel" class="py-3 rounded-xl bg-slate-100 font-semibold text-sm">Ricontrolla</button>
          <button id="alertConfirm" class="py-3 rounded-xl bg-red-500 text-white font-semibold text-sm">Sì, manca</button>
        </div>
      </div>`;
    document.body.appendChild(popup);
    popup.querySelector('#alertCancel').onclick=()=>{
      popup.remove();
      // log falso allarme
      supa.from('alerts_log').insert({item:itemName,user_name:user?.name,was_really_missing:false,qty_made_that_day:a.last_made_qty,made_by:a.last_made_by,made_at:a.last_made_at});
      resolve(false);
    };
    popup.querySelector('#alertConfirm').onclick=()=>{

      resolve(true);
    };
  });
}

function renderS(){
  const list=items.filter(i=>station2==='All'||i.category?.includes(station2));
  const counts=['Oven','Pasta','Plating','Salad','Freezer'].map(s=>{
    const c=items.filter(i=>i.need_tomorrow&&i.category?.includes(s)).length;
    return c?`${s}: ${c} ${tr('closeCount')}`:null;
  }).filter(Boolean).join(' • ');
  checks.innerHTML=(counts?`<div class="text-xs text-amber-700 mb-2 font-medium">${counts}</div>`:'')+
    list.map(i=>{
      const ans=closingAnswers[i.id];
      return `<div class="bg-white p-3 rounded-2xl border ${ans===false?'border-red-300 bg-red-50':ans===true?'border-green-300 bg-green-50':'border-slate-200'} shadow-sm">
        <div class="flex items-center justify-between mb-2">
          <span class="font-semibold text-[14px]">${i.name}</span>
          <span class="text-[10px] text-slate-400">${i.category||''}</span>
        </div>
        <div class="grid grid-cols-2 gap-2">
          <button onclick="setClosing('${i.id}',true)" class="py-2.5 rounded-xl text-sm font-semibold transition active:scale-95 ${ans===true?'bg-green-600 text-white':'bg-slate-100 text-slate-700'}">${tr('thereIs')}</button>
          <button onclick="setClosing('${i.id}',false)" class="py-2.5 rounded-xl text-sm font-semibold transition active:scale-95 ${ans===false?'bg-red-500 text-white':getAlertLevel(i.name)?'bg-amber-100 text-amber-800 border border-amber-300':'bg-slate-100 text-slate-700'}">${tr('missing')}${getAlertLevel(i.name)&&ans!==false?' ⚠️':''}</button>

window.setClosing=async(id,value)=>{
  if(value===false){
    // controlla se prodotto stamani
    const proceed = await checkBeforeMissing(id, tasks[id]?.name||'');
    if(!proceed) return;
  }
  closingAnswers[id]=value;
  await supa.from('prep_tasks').update({need_tomorrow:!value}).eq('id',id);
  tasks[id].need_tomorrow=!value;
  renderS(); renderM(); renderHomeStations();
};

async function closeTurn(){
  const list=items.filter(i=>station2==='All'||i.category?.includes(station2));
  const forgotten=list.filter(i=>closingAnswers[i.id]===undefined);
  if(forgotten.length>0){
    showForgottenPopup(forgotten);
  } else {
    doCloseTurn();
  }
}

function showForgottenPopup(forgotten){
  const popup=document.createElement('div');
  popup.className='fixed inset-0 z-50 bg-black/50 backdrop-blur-sm flex items-end';
  popup.innerHTML=`
    <div class="bg-white w-full max-w-md mx-auto rounded-t-[28px] p-5 max-h-[80vh] overflow-auto" style="animation:slideUp .25s ease">
      <div class="w-10 h-1 bg-slate-300 rounded-full mx-auto mb-4"></div>
      <p class="text-sm font-bold text-red-600 mb-3">⚠️ ${tr('forgottenAlert')}</p>
      <div class="space-y-2 mb-4" id="forgottenList">
        ${forgotten.map(i=>`
        <div id="fp_${i.id}" class="bg-slate-50 p-3 rounded-xl">
          <div class="font-medium text-sm mb-2">${i.name} <span class="text-[10px] text-slate-400">${i.category||''}</span></div>
          <div class="grid grid-cols-3 gap-2">
            <button onclick="setFromPopup('${i.id}',true)" class="py-2 rounded-xl text-xs font-semibold bg-slate-100">${tr('thereIs')}</button>
            <button onclick="setFromPopup('${i.id}',false)" class="py-2 rounded-xl text-xs font-semibold bg-slate-100">${tr('missing')}</button>
            <button onclick="goCheckStation('${i.category||''}','${i.id}')" class="py-2 rounded-xl text-xs font-semibold bg-amber-100 text-amber-800">${tr('goCheck')}</button>
          </div>
        </div>`).join('')}
      </div>
      <button id="popupCloseBtn" onclick="tryCloseFromPopup()" class="w-full py-3 bg-slate-900 text-white rounded-xl font-semibold">${tr('closeTurn')}</button>
    </div>`;
  popup.onclick=e=>{if(e.target===popup)popup.remove()};
  document.body.appendChild(popup);

  window._activePopup=popup;

  window.setFromPopup=async(id,value)=>{
    if(value===false){
      const proceed = await checkBeforeMissing(id, tasks[id]?.name||'');
      if(!proceed) return;
    }
    closingAnswers[id]=value;
    await supa.from('prep_tasks').update({need_tomorrow:!value}).eq('id',id);
    tasks[id].need_tomorrow=!value;
    // aggiorna visivamente la card nel popup
    const card=document.getElementById(`fp_${id}`);
    if(card) card.style.opacity='0.4';
    renderS(); renderM(); renderHomeStations();
    // controlla se tutti risposti
    const allList=items.filter(i=>station2==='All'||i.category?.includes(station2));
    const still=allList.filter(i=>closingAnswers[i.id]===undefined);
    if(!still.length){popup.remove();doCloseTurn();}
  };

  window.goCheckStation=async(category,itemId)=>{
    popup.remove();
    // porta alla tab chiusura con la stazione giusta
    const stName=category.replace(' Station','').replace('Station','').trim();
    if(stName) station2=stName;
    document.querySelector('[data-t=s]').click();
    // evidenzia l'item specifico
    setTimeout(()=>{
      const el=document.querySelector(`[onclick*="setClosing('${itemId}'"]`);
      if(el){el.closest('div.bg-white')?.scrollIntoView({behavior:'smooth',block:'center'});el.closest('div.bg-white')?.classList.add('ring-2','ring-amber-400')}
    },300);
  };

  window.tryCloseFromPopup=async()=>{
    const allList=items.filter(i=>station2==='All'||i.category?.includes(station2));
    const still=allList.filter(i=>closingAnswers[i.id]===undefined);
    if(still.length>0){
      const btn=document.getElementById('popupCloseBtn');
      btn.textContent='Rispondi prima a tutti ⬆';
      setTimeout(()=>btn.textContent=tr('closeTurn'),2000);
    } else {
      popup.remove();
      doCloseTurn();
    }
  };
}

async function doCloseTurn(){
  const missing=items.filter(i=>closingAnswers[i.id]===false);
  await supa.from('messages').insert({
    text:`🔒 Turno chiuso da ${user.name}. Manca: ${missing.map(i=>i.name).join(', ')||'niente'}.`,
    user_name:user.name,
    lang:user.lang||'it'
  });
  closingAnswers={};
  renderS(); renderHomeStations();
  const btn=document.getElementById('closeTurnBtn');
  btn.textContent='✓ '+tr('closeTurnDone');
  btn.classList.add('bg-green-600');
  setTimeout(()=>{btn.textContent=tr('closeTurn');btn.classList.remove('bg-green-600')},3000);
}

// ── RICETTE ──
async function openRecipeForItem(itemId){
  const task = tasks[itemId];
  // prima controlla recipe_id su prep_tasks
  if(task?.recipe_id){
    const{data:recipe}=await supa.from('recipes').select('*').eq('id',task.recipe_id).maybeSingle();
    if(recipe){showRecipeSheet(recipe);return}
  }
  // fallback a recipeLinks legacy
  const linked=recipeLinks[itemId];
  if(linked){
    const rec=SHOP_RECIPES.find(r=>r.id==linked||r.title===linked);
    if(rec){showRecipeSheet(rec);return}
  }
  // fallback a nota
  if(task?.note){
    showNoteSheet(task.name, task.note);
    return;
  }
  // niente
  if(isAdmin()){
    if(confirm('Nessuna ricetta o nota. Vuoi aggiungere una nota adesso?')) openPrepEditor(task);
  }
}

async function openRecipeByData(idx){
  let rec={...SHOP_RECIPES[idx]};
  async function groqTr(text){
    if(!text)return '';
    const r=await fetch(`${SUPABASE_URL}/functions/v1/ai-translate`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${SUPABASE_ANON_KEY}`},body:JSON.stringify({text,targetLang:user.lang})});
    const j=await r.json();return j.translated||text;
  }
  if(user?.lang&&user.lang!=='it'&&rec.id){
    let{data:tr}=await supa.from('recipe_translations').select('*').eq('recipe_id',rec.id).eq('lang',user.lang).maybeSingle();
    if(!tr){
      try{
        const newTr={recipe_id:rec.id,lang:user.lang,title:rec.title,procedure:await groqTr(rec.procedure||''),equipment:await groqTr(rec.equipment||''),ingredients:await Promise.all((rec.ingredients||[]).map(async i=>({...i,name:await groqTr(i.name),comment:i.comment?await groqTr(i.comment):''}))),};
        await supa.from('recipe_translations').upsert(newTr);tr=newTr;
      }catch(e){console.warn('Groq fail',e)}
    }
    if(tr){rec.title=tr.title||rec.title;rec.procedure=tr.procedure;rec.equipment=tr.equipment;rec.ingredients=tr.ingredients;}
  }
  showRecipeSheet(rec);
}

async function showTranslation(name, el){

function showChat(){
  document.querySelectorAll('.tab').forEach(x=>{x.classList.remove('tab-active');x.classList.add('text-slate-500');const svg=x.querySelector('svg');if(svg)svg.style.stroke='';const sp=x.querySelector('.tab-label');if(sp)sp.style.color=''});
  ['vh','vm','vs','vr','vp'].forEach(id=>document.getElementById(id).classList.add('hidden'));
  document.getElementById('vc').classList.remove('hidden');
  loadChat();startChatRealtime();
  document.getElementById('badge').classList.add('hidden');
  document.getElementById('badge').textContent='0';
}
async function loadChat(){
  const{data}=await supa.from('messages').select('*').order('created_at',{ascending:true}).limit(100);
  msgs.innerHTML='';(data||[]).forEach(m=>addMsg(m,true));
}
function addMsg(m,init){
  const me=m.user_name===user?.name;
  const d=document.createElement('div');
  d.className='flex '+(me?'justify-end':'');
  const needs=m.lang&&user&&m.lang!==user.lang;
  d.innerHTML=`<div class="max-w-[75%]"><div class="text-xs text-slate-500">${m.user_name}</div><div class="${me?'bg-slate-900 text-white':'bg-white border'} px-3 py-2 rounded-2xl text-sm">${m.text}</div>${needs?'<div class="text-xs text-slate-500 italic mt-1" data-tr>...</div>':''}</div>`;
  msgs.appendChild(d);msgs.scrollTop=99999;
  if(needs){
    fetch(`${SUPABASE_URL}/functions/v1/ai-translate`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${SUPABASE_ANON_KEY}`},body:JSON.stringify({text:m.text,targetLang:user.lang})})
    .then(r=>r.json()).then(j=>{const el=d.querySelector('[data-tr]');if(el)el.textContent=j.translated||''});
  }
  if(!init&&!me){const badge=document.getElementById('badge');badge.textContent=(parseInt(badge.textContent||'0')+1);badge.classList.remove('hidden')}
}
let chatChannel=null;
function startChatRealtime(){
  if(chatChannel)return;
  chatChannel=supa.channel('public:messages').on('postgres_changes',{event:'INSERT',schema:'public',table:'messages'},p=>addMsg(p.new,false)).subscribe();
}
document.getElementById('f').onsubmit=async e=>{
  e.preventDefault();
  const v=document.getElementById('txt').value.trim();
  if(!v)return;
  document.getElementById('txt').value='';

async function loadReport(type){
  document.getElementById('reportOut').classList.remove('hidden');
  document.getElementById('presenceLogOut').classList.add('hidden');
  document.getElementById('alertsLogOut').classList.add('hidden');
  document.getElementById('btnPresence')?.classList.remove('bg-slate-900','text-white');
  document.getElementById('btnPresence')?.classList.add('bg-slate-200');
  document.getElementById('btnAlertsLog')?.classList.remove('bg-slate-900','text-white');
  document.getElementById('btnAlertsLog')?.classList.add('bg-slate-200');
  const out=document.getElementById('reportOut');out.innerHTML='...';
  document.getElementById('btnToday').classList.toggle('bg-slate-900',type==='today');document.getElementById('btnToday').classList.toggle('text-white',type==='today');
  document.getElementById('btnWeek').classList.toggle('bg-slate-900',type==='week');document.getElementById('btnWeek').classList.toggle('text-white',type==='week');
  try{
    if(type==='today'){
      const now=new Date();const startUTC=new Date(now.getFullYear(),now.getMonth(),now.getDate()).toISOString();
      const{data:logs}=await supa.from('prep_log').select('item,qty,unit,container,user_name,created_at').gte('created_at',startUTC).order('created_at',{ascending:false});
      lastReport=logs||[];
      const by={};logs.forEach(l=>by[l.user_name]=(by[l.user_name]||0)+1);
      const byHtml=Object.keys(by).length?`<div class="mb-3 p-2 bg-slate-50 rounded-lg text-xs"><div class="font-semibold mb-1">${tr('prepBy')}</div>${Object.entries(by).map(([u,c])=>`${u}: ${c}`).join(' • ')}</div>`:'';
      if(!logs.length){out.innerHTML=byHtml+`<p class="text-slate-500">${tr('noData')}</p>`;return}
      out.innerHTML=byHtml+`<table class="w-full text-xs"><thead><tr class="border-b font-semibold"><td class="py-1">${tr('item')}</td><td>Qty</td><td>${tr('unit')}</td><td>Cont.</td><td>Chi</td><td>Ora</td></tr></thead><tbody>`+logs.map(r=>{const t=new Date(r.created_at).toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});return`<tr class="border-b"><td class="py-1">${r.item}</td><td>${r.qty}</td><td>${r.unit||''}</td><td>${r.container||''}</td><td>${r.user_name}</td><td>${t}</td></tr>`}).join('')+`</tbody></table>`;
    }else{
      const mon=new Date();const d=mon.getDay();const diff=d===0?-6:1-d;mon.setDate(mon.getDate()+diff);const monStr=mon.toISOString().slice(0,10);
      const{data}=await supa.from('v_prep_weekly').select('*').eq('settimana_lun',monStr);
      const map={};(data||[]).forEach(r=>{if(!map[r.item])map[r.item]=Array(7).fill('');map[r.item][r.giorno_num-1]=`${r.totale} ${r.unit||''}`});
      lastReport=Object.entries(map).map(([item,vals])=>({item,vals}));
      const days=user?.lang==='en'?['Mon','Tue','Wed','Thu','Fri','Sat','Sun']:user?.lang==='es'?['Lun','Mar','Mié','Jue','Vie','Sáb','Dom']:['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];
      out.innerHTML=`<table class="w-full text-xs"><thead><tr class="border-b font-semibold"><td>${tr('item')}</td>${days.map(d=>`<td>${d}</td>`).join('')}</tr></thead><tbody>`+lastReport.map(r=>`<tr class="border-b"><td class="py-1">${r.item}</td>${r.vals.map(v=>`<td>${v||''}</td>`).join('')}</tr>`).join('')+`</tbody></table>`;
    }
  }catch(e){out.innerHTML=`<p class="text-red-600">${e.message}</p>`}
}
function exportPDF(){
  if(!lastReport.length)return;
  const{jsPDF}=window.jspdf;const doc=new jsPDF();
  doc.text(tr('report'),14,15);doc.autoTable({html:'#reportOut table',startY:20});doc.save('report.pdf');
}


// ── PRESENZA REALTIME ──
let presenceInterval = null;
let presenceChannel = null;

async function updatePresence(){
  if(!user) return;
  const station = station2 !== 'All' ? station2 : (station !== 'All' ? station : null);
  await supa.from('user_presence').upsert(
    {user_name: user.name, last_seen: new Date().toISOString(), role: user.role||'staff', station: station||null},
    {onConflict: 'user_name'}
  );
}

async function loadPresence(){
  const{data}=await supa.from('user_presence').select('*').order('last_seen',{ascending:false});
  if(!data) return;
  const now = Date.now();
  const online = data.filter(u => (now - new Date(u.last_seen).getTime()) < 2*60*1000);
  const el = document.getElementById('online');
  el.innerHTML = online.map(u => {
    const initials = u.user_name.slice(0,2).toUpperCase();
    const isMe = u.user_name === user?.name;
    const colors = ['bg-emerald-500','bg-blue-500','bg-purple-500','bg-amber-500','bg-rose-500','bg-teal-500'];
    const colorIdx = u.user_name.charCodeAt(0) % colors.length;
    return `<div onclick="showPresenceTooltip('${u.user_name}','${u.station||''}',this)" 
      class="w-7 h-7 ${colors[colorIdx]} rounded-full flex items-center justify-center text-white text-[10px] font-bold border-2 border-white cursor-pointer relative ${isMe?'ring-2 ring-emerald-300':''}"
      title="${u.user_name}${u.station?' • '+u.station:''}">
      ${initials}
    </div>`;
  }).join('');
}

function showPresenceTooltip(name, station, el){
  // rimuovi tooltip esistenti
  document.querySelectorAll('.presence-tooltip').forEach(t=>t.remove());
  const tip = document.createElement('div');
  tip.className = 'presence-tooltip fixed z-50 bg-slate-900 text-white text-xs px-3 py-2 rounded-xl shadow-xl';
  tip.innerHTML = `<div class="font-semibold">${name}</div>${station?`<div class="text-slate-300">${station}</div>`:''}`;
  const rect = el.getBoundingClientRect();
  tip.style.top = (rect.bottom + 6) + 'px';
  tip.style.left = Math.max(8, rect.left - 40) + 'px';
  document.body.appendChild(tip);
  setTimeout(()=>tip.remove(), 2500);
}

function startPresence(){
  updatePresence();
  loadPresence();
  presenceInterval = setInterval(()=>{updatePresence();loadPresence();}, 60000);
  // realtime
  presenceChannel = supa.channel('presence-rt')
    .on('postgres_changes',{event:'*',schema:'public',table:'user_presence'},loadPresence)
    .subscribe();
}

function stopPresence(){
  if(presenceInterval) clearInterval(presenceInterval);
  if(presenceChannel) supa.removeChannel(presenceChannel);
}

// ── LOG PRESENZE (solo Max) ──
async function loadPresenceLog(){
  const out = document.getElementById('presenceLogOut');
  if(!out) return;
  out.innerHTML = '<p class="text-slate-400 text-xs">Caricamento...</p>';
  const since = new Date(Date.now() - 7*24*60*60*1000).toISOString();
  const{data} = await supa.from('user_presence').select('*').order('last_seen',{ascending:false});
  if(!data||!data.length){out.innerHTML='<p class="text-slate-400 text-xs">Nessun dato</p>';return}
  const now = Date.now();
  out.innerHTML = `<table class="w-full text-xs"><thead><tr class="border-b font-semibold"><td class="py-1">Utente</td><td>Stazione</td><td>Ruolo</td><td>Ultimo accesso</td><td>Stato</td></tr></thead><tbody>`+
    data.map(u=>{
      const diff = now - new Date(u.last_seen).getTime();
      const isOnline = diff < 2*60*1000;
      const mins = Math.floor(diff/60000);
      const hours = Math.floor(mins/60);
      const timeAgo = isOnline ? 'Online' : hours>0 ? `${hours}h fa` : `${mins}m fa`;
      return `<tr class="border-b">
        <td class="py-1 font-medium">${u.user_name}</td>
        <td>${u.station||'—'}</td>
        <td>${u.role||'staff'}</td>
        <td>${new Date(u.last_seen).toLocaleString('it-IT',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</td>
        <td><span class="px-1.5 py-0.5 rounded-full text-[10px] font-semibold ${isOnline?'bg-green-100 text-green-700':'bg-slate-100 text-slate-500'}">${timeAgo}</span></td>
      </tr>`;
    }).join('')+`</tbody></table>`;
}
